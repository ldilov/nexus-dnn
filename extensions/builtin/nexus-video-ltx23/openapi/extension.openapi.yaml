openapi: 3.0.3
info:
  title: LTX 2.3 Video Extension API
  version: 0.1.0
  description: |
    Extension routes mounted by the host's generic dispatcher under
    /api/v1/extensions/nexus.video.ltx23/*. All endpoints are extension-owned.

servers:
  - url: /api/v1/extensions/{ext_id}
    variables:
      ext_id:
        default: nexus.video.ltx23

paths:
  /health:
    get:
      tags: [LTX Video Extension]
      summary: Extension liveness + runtime profile snapshot
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExtensionHealth' }

  /runtime-profiles:
    get:
      tags: [LTX Video Extension]
      summary: List installed runtime profiles with health badges
      responses:
        '200':
          description: Profiles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RuntimeProfileSummary' }

  /recipe/plan:
    post:
      tags: [LTX Video Extension]
      summary: Validate request and compute a RenderPlan (no GPU work)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Ltx23CreateRenderRequest' }
      responses:
        '200':
          description: Render plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ltx23RenderPlan' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExtensionError' }

  /renders:
    post:
      tags: [LTX Video Extension]
      summary: Start a render run
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Ltx23CreateRenderRequest' }
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ltx23RenderRun' }
        '400':
          description: Invalid request
        '409':
          description: Idempotency conflict

  /renders/{run_id}:
    get:
      tags: [LTX Video Extension]
      summary: Get render status
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Run state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ltx23RenderRun' }
        '404':
          description: Run not found

  /renders/{run_id}/cancel:
    post:
      tags: [LTX Video Extension]
      summary: Request cancellation
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '202':
          description: Cancel requested

  /renders/{run_id}/retry-segment:
    post:
      tags: [LTX Video Extension]
      summary: Re-render a single segment
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [segment_index]
              properties:
                segment_index: { type: integer, minimum: 0 }
                prompt_override: { type: string }
      responses:
        '202':
          description: Retry accepted

  /renders/{run_id}/segments:
    get:
      tags: [LTX Video Extension]
      summary: List per-segment status rows for a run
      parameters:
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Segment rows in index order
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Ltx23SegmentSummary' }
        '404':
          description: Run not found

  /artifacts/{artifact_id}:
    get:
      tags: [LTX Video Extension]
      summary: Stream the final MP4 for a completed run
      parameters:
        - name: artifact_id
          in: path
          required: true
          description: Currently the only supported form is `ltx23-run-<run_id>-final`.
          schema: { type: string }
      responses:
        '200':
          description: MP4 bytes
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '404':
          description: Artifact file missing on disk

  /profiles/{profile_id}/install:
    get:
      tags: [LTX Video Extension]
      summary: Current install state for a runtime profile
      description: |
        Reports whether the LTX-2.3 weights for `profile_id` are installed,
        whether a runtime install is in flight, the most-recent phase, and
        a bounded ring buffer of recent worker output lines (capped at 200
        entries / 1024 chars per entry). The runtime install chains
        `uv sync --extra diffusers` with `huggingface_hub.snapshot_download`.
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '200':
          description: Install status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ltx23ProfileInstallStatus' }
    post:
      tags: [LTX Video Extension]
      summary: Trigger a unified runtime install (uv sync + weights)
      description: |
        Idempotent: if the runtime install is already in flight for this
        profile, returns the current status without spawning a second
        worker. Sets `in_flight=true` immediately, then progressively
        populates `phase` and `recent_progress` as the worker emits
        `ltx.video.runtime.install.{progress,done,error}` notifications.
        On success the host writes `<dest>/.nexus-install-complete`.
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '202':
          description: Install accepted (sync or already in flight)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Ltx23ProfileInstallStatus' }
        '400':
          description: Unknown profile (e.g. `fake` has no installable model)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExtensionError' }
        '503':
          description: Worker runtime unavailable

components:
  parameters:
    ProfileId:
      name: profile_id
      in: path
      required: true
      description: Runtime profile id; `auto` and `fake` reject with 400.
      schema:
        type: string
        enum: [rtx40-fp8, rtx50-fp8, rtx50-nvfp4]

  schemas:
    Ltx23CreateRenderRequest:
      type: object
      required: [prompt, duration_seconds]
      properties:
        project_id: { type: string }
        input_image_artifact_id: { type: string }
        prompt: { type: string, minLength: 1 }
        negative_prompt: { type: string }
        style_prompt: { type: string }
        duration_seconds: { type: number, minimum: 1, maximum: 300 }
        runtime_profile:
          type: string
          enum: [auto, rtx50-nvfp4, rtx50-fp8, rtx40-fp8]
        quality_preset:
          type: string
          enum: [draft, balanced_16gb, quality_16gb, high]
        width: { type: integer }
        height: { type: integer }
        base_fps: { type: integer }
        output_fps: { type: integer }
        seed: { type: integer }

    Ltx23RenderPlan:
      type: object
      required: [mode, segment_count]
      properties:
        mode:
          type: string
          enum: [external_segments]
        width: { type: integer }
        height: { type: integer }
        base_fps: { type: integer }
        output_fps: { type: integer }
        requested_duration_seconds: { type: number }
        planned_duration_seconds: { type: number }
        segment_count: { type: integer }
        runtime_profile: { type: string }
        gpu_memory_budget_mb: { type: integer }
        interpolation:
          type: string
          enum: [rife_2x, none]
        vram_risk:
          type: string
          enum: [safe, moderate, risky, likely_to_fail, unsupported]
        warnings:
          type: array
          items: { type: string }
        segments:
          type: array
          items: { $ref: '#/components/schemas/Ltx23RenderSegmentPlan' }

    Ltx23RenderSegmentPlan:
      type: object
      properties:
        index: { type: integer }
        start_time_seconds: { type: number }
        duration_seconds: { type: number }
        overlap_seconds: { type: number }
        frame_count: { type: integer }
        seed: { type: integer }
        action_prompt: { type: string }

    Ltx23RenderRun:
      type: object
      properties:
        id: { type: string }
        project_id: { type: string }
        status:
          type: string
          enum: [queued, planning, waiting_for_runtime, rendering, joining, interpolating, encoding, completed, failed_retryable, failed, cancelled]
        progress_percent: { type: number }
        runtime_profile: { type: string, nullable: true }
        segment_count: { type: integer }
        completed_segments: { type: integer }
        requested_duration_seconds: { type: number }
        planned_duration_seconds: { type: number, nullable: true }
        width: { type: integer }
        height: { type: integer }
        base_fps: { type: integer }
        output_fps: { type: integer }
        final_artifact_id: { type: string, nullable: true }
        error_code: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        segments:
          type: array
          items: { $ref: '#/components/schemas/Ltx23SegmentSummary' }

    Ltx23SegmentSummary:
      type: object
      required: [index, status, duration_seconds]
      properties:
        index: { type: integer, minimum: 0 }
        status:
          type: string
          enum: [queued, rendering, completed, failed]
        duration_seconds: { type: number }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }

    Ltx23ProfileInstallStatus:
      type: object
      required: [profile, installed, in_flight, recent_progress]
      properties:
        profile:
          type: string
          description: Runtime profile id (e.g. `rtx40-fp8`, `rtx50-fp8`, `rtx50-nvfp4`).
        installed:
          type: boolean
          description: True when the host has observed `<dest>/.nexus-install-complete`.
        repo:
          type: string
          nullable: true
          description: Hugging Face repo id, e.g. `Lightricks/LTX-2.3-fp8`. Null for profiles without an installable model.
        dest:
          type: string
          nullable: true
          description: Absolute filesystem path the weights resolve to (`<host_data_dir>/models/<owner>/<name>`).
        in_flight:
          type: boolean
          description: True while the worker is mid-install (uv sync OR snapshot download).
        last_error:
          type: string
          nullable: true
        phase:
          type: string
          nullable: true
          description: |
            Most-recent worker-emitted phase. One of
            `starting`, `resolving_deps`, `downloading_weights`, `done`, or
            `error:<phase>` when the worker reported a failure. Null before
            any progress notification has been received.
        recent_progress:
          type: array
          description: |
            Bounded ring buffer (200 entries, 1024 chars/entry) of recent
            worker output lines, each prefixed with the originating stream
            (`stdout:`, `stderr:`, or `info:` for synthetic lines emitted by
            the host service itself).
          items: { type: string }

    RuntimeProfileSummary:
      type: object
      properties:
        runtime_id: { type: string }
        display_name: { type: string }
        installed: { type: boolean }
        healthy: { type: boolean }
        experimental: { type: boolean }
        status_message: { type: string }

    ExtensionHealth:
      type: object
      required: [status, version, extension_id]
      properties:
        status:
          type: string
          enum: [ok]
        version: { type: string }
        extension_id:
          type: string
          enum: [nexus.video.ltx23]

    ExtensionError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        recovery_hint: { type: string }
