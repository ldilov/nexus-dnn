[project]
name = "nexus-video-ltx23-worker"
version = "0.1.0"
description = "LTX-2.3 video render worker for the nexus.video.ltx23 extension. Stdio JSON-RPC over NDJSON. Supports fake (no-GPU) mode and real diffusers-based pipeline (P2)."
requires-python = ">=3.11,<3.13"
readme = "README.md"
license = { text = "GPL-3.0-or-later" }

dependencies = [
  # Stdio protocol + structured logs are pure-python. Heavy ML deps are
  # optional extras gated by profile so the `fake` runtime installs in
  # seconds without torch on path.
  "pydantic>=2.8",
  "pyyaml>=6.0",
  "ffmpeg-python>=0.2",
  "pillow>=10.0",
  "numpy>=1.26,<3.0",
  # Model downloads are driven by the worker (see installer.py). Adding
  # huggingface_hub to the base deps lets the install flow run before the
  # `diffusers` optional extras are installed ã chicken-and-egg fix.
  "huggingface_hub>=0.26",
  # Cap below 0.50: the 0.49.x line is the upstream-confirmed
  # known-good pair with transformers 4.57.x for the NF4 quant path
  # (see the transformers pin note in the diffusers extra).
  "bitsandbytes[diffusers]>=0.45,<0.50",
]

[project.optional-dependencies]
# Real-runtime deps (P2+). The fake profile installs only the base set.
diffusers = [
  "torch>=2.10",
  "torchvision>=0.25",
  "torchaudio>=2.10",
  # The released diffusers 0.37.1 dropped the in-progress LTX-2.3
  # schema (audio_scale_shift_table shape [9, 2048] expected by the
  # weights but reverted to [6, 2048] in the released
  # LTX2VideoTransformer3DModel). The published `Lightricks/LTX-2.3-fp8`
  # and community `dg845/LTX-2.3-Distilled-Diffusers` weights both
  # require the dev schema. Validated working at the pinned commit on
  # 2026-05-13 (P0-T001 success on RTX 5070 Ti, prompt-matching first
  # frame generated). Revisit once a released diffusers re-adds
  # LTX-2.3 transformer support ã currently 0.39.0.dev0.
  "diffusers @ git+https://github.com/huggingface/diffusers.git@adff1cae9f3d4f79dcff6a3ceb02e0a56982f88c",
  # Cap below 5.0. transformers 5.x's model-loading refactor
  # (core_model_loading.set_param_for_module) passes an internal
  # `_is_hf_initialized` kwarg into the bitsandbytes parameter
  # constructor, which the 0.49.x `Params4bit.__new__` signature
  # rejects ã fatal for the NF4 quant path. 4.57.x is the
  # upstream-confirmed known-good pair (huggingface/transformers
  # #43872) and still ships Gemma-3 (added 4.50), which the LTX-2.3
  # text encoder needs. Mirrors the emotion-tts worker's
  # `transformers>=4.52,<5.0` precedent. Revisit when bnb ships a
  # transformers-5-compatible release.
  "transformers>=4.52,<5.0",
  "accelerate>=1.0",
  "safetensors>=0.4",
  "huggingface_hub>=0.26",
  "einops>=0.8",
  # Read GGUF transformer checkpoints (Q4_K_M, Q5_K_M, Q8_0, F16/BF16
  # quants) and inject as state_dict into LTX2VideoTransformer3DModel,
  # bypassing diffusers 0.39.0.dev0 `from_single_file` utf-8-sniff
  # regression. The diffusers `quantizers/gguf/` runtime ops handle the
  # on-device dequant; we only need the reader half from this package.
  "gguf>=0.10",
  # T5 tokenizer backend for the LTX-Video 0.9.x line
  # (`rtx50-ltxv097-gguf`). The LTX-2.3 path uses Gemma-3 (no
  # sentencepiece), so this was absent until the 0.9.7 profile ã
  # without it `transformers` returns a lazy `Placeholder` for
  # `T5Tokenizer` and diffusers' `from_pretrained` aborts the pipeline
  # load ("component ... cannot be loaded ... no loading methods").
  # GPU-verified required on 2026-05-18 (smoke-ltxv097-render).
  # `protobuf` is the T5 fastãslow conversion dep.
  "sentencepiece>=0.2",
  "protobuf>=4",
  # Farneback dense optical flow for the advanced-motion quality gate
  # (motion.py). headless = no GUI/Qt deps (server-appropriate);
  # Apache-2.0. Optional at runtime ã motion.py degrades to the
  # numpy-only metrics if cv2 is absent.
  "opencv-python-headless>=4.10",
]
# NOTE: RIFE FPS interpolation is NOT a pip dependency. The
# rife-ncnn-vulkan-python package is sdist-only (CMake+Vulkan source
# build, fails on stock Windows). RIFE ships instead as the upstream
# nihui/rife-ncnn-vulkan prebuilt binary, auto-staged at runtime by
# `ltx_video_worker.fps_interp` (silent ffmpeg-minterpolate fallback).
test = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
]

[project.scripts]
nexus-video-ltx23-worker = "ltx_video_worker.__main__:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ltx_video_worker"]

# Required because the `diffusers` extra pins to a git commit URL.
# Hatch refuses direct references by default; opt-in here scoped to
# this worker package.
[tool.hatch.metadata]
allow-direct-references = true

# PyTorch ships separate wheels for CPU vs each CUDA toolchain on its own
# index. The default PyPI resolution lands on the CPU wheel, which is fatal
# for RTX 5070 Ti Blackwell (compute 12.0, sm_120) where CUDA 12.8+ is
# required. Route the three torch wheels through PyTorch's cu128 index;
# everything else (diffusers, transformers, etc.) still resolves via PyPI.
[tool.uv.sources]
torch = [{ index = "pytorch-cu128" }]
torchvision = [{ index = "pytorch-cu128" }]
torchaudio = [{ index = "pytorch-cu128" }]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
