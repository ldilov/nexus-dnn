[project]
name = "nexus-video-ltx23-worker"
version = "0.1.0"
description = "LTX-2.3 video render worker for the nexus.video.ltx23 extension. Stdio JSON-RPC over NDJSON. Supports fake (no-GPU) mode and real diffusers-based pipeline (P2)."
requires-python = ">=3.11,<3.13"
readme = "README.md"
license = { text = "GPL-3.0-or-later" }

dependencies = [
  # Stdio protocol + structured logs are pure-python. Heavy ML deps are
  # optional extras gated by profile so the `fake` runtime installs in
  # seconds without torch on path.
  "pydantic>=2.8",
  "pyyaml>=6.0",
  "ffmpeg-python>=0.2",
  "pillow>=10.0",
  "numpy>=1.26,<3.0",
  # Model downloads are driven by the worker (see installer.py). Adding
  # huggingface_hub to the base deps lets the install flow run before the
  # `diffusers` optional extras are installed — chicken-and-egg fix.
  "huggingface_hub>=0.26",
]

[project.optional-dependencies]
# Real-runtime deps (P2+). The fake profile installs only the base set.
diffusers = [
  "torch>=2.10",
  "torchvision>=0.25",
  "torchaudio>=2.10",
  # The released diffusers 0.37.1 dropped the in-progress LTX-2.3
  # schema (audio_scale_shift_table shape [9, 2048] expected by the
  # weights but reverted to [6, 2048] in the released
  # LTX2VideoTransformer3DModel). The published `Lightricks/LTX-2.3-fp8`
  # and community `dg845/LTX-2.3-Distilled-Diffusers` weights both
  # require the dev schema. Validated working at the pinned commit on
  # 2026-05-13 (P0-T001 success on RTX 5070 Ti, prompt-matching first
  # frame generated). Revisit once a released diffusers re-adds
  # LTX-2.3 transformer support — currently 0.39.0.dev0.
  "diffusers @ git+https://github.com/huggingface/diffusers.git@adff1cae9f3d4f79dcff6a3ceb02e0a56982f88c",
  "transformers>=4.45",
  "accelerate>=1.0",
  "safetensors>=0.4",
  "huggingface_hub>=0.26",
  "einops>=0.8",
]
interpolation = [
  # Practical-RIFE has pip wheels via this fork. Pin loose for now; lockfile
  # produced at install time will pin exactly.
  "rife-ncnn-vulkan-python>=1.2; sys_platform != 'darwin'",
]
test = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
]

[project.scripts]
nexus-video-ltx23-worker = "ltx_video_worker.__main__:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ltx_video_worker"]

# Required because the `diffusers` extra pins to a git commit URL.
# Hatch refuses direct references by default; opt-in here scoped to
# this worker package.
[tool.hatch.metadata]
allow-direct-references = true

# PyTorch ships separate wheels for CPU vs each CUDA toolchain on its own
# index. The default PyPI resolution lands on the CPU wheel, which is fatal
# for RTX 5070 Ti Blackwell (compute 12.0, sm_120) where CUDA 12.8+ is
# required. Route the three torch wheels through PyTorch's cu128 index;
# everything else (diffusers, transformers, etc.) still resolves via PyPI.
[tool.uv.sources]
torch = [{ index = "pytorch-cu128" }]
torchvision = [{ index = "pytorch-cu128" }]
torchaudio = [{ index = "pytorch-cu128" }]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
