spec_version: '0.1'
operator:
  id: nexus.video.ltx23.check-render-status
  version: 0.1.0
  display_name: "Check LTX-2.3 Render Status"
  description: "Poll render status for a previously-submitted run_id."
inputs:
  - name: run_id
    type: string
    required: true
outputs:
