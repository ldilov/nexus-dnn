[project]
name = "nexus-video-ltx23-worker"
version = "0.1.0"
description = "LTX-2.3 video render worker for the nexus.video.ltx23 extension. Stdio JSON-RPC over NDJSON. Supports fake (no-GPU) mode and real diffusers-based pipeline (P2)."
requires-python = ">=3.12,<3.13"
readme = "README.md"
license = { text = "GPL-3.0-or-later" }

dependencies = [
  # Stdio protocol + structured logs are pure-python. Heavy ML deps are
  # optional extras gated by profile so the `fake` runtime installs in
  # seconds without torch on path.
  "pydantic>=2.8",
  "pyyaml>=6.0",
  "ffmpeg-python>=0.2",
  "pillow>=10.0",
  "numpy>=1.26,<3.0",
]

[project.optional-dependencies]
# Real-runtime deps (P2+). The fake profile installs only the base set.
diffusers = [
  "torch>=2.10",
  "torchvision>=0.25",
  "torchaudio>=2.10",
  "diffusers>=0.32",
  "transformers>=4.45",
  "accelerate>=1.0",
  "safetensors>=0.4",
  "huggingface_hub>=0.26",
  "einops>=0.8",
]
interpolation = [
  # Practical-RIFE has pip wheels via this fork. Pin loose for now; lockfile
  # produced at install time will pin exactly.
  "rife-ncnn-vulkan-python>=1.2; sys_platform != 'darwin'",
]
test = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
]

[project.scripts]
nexus-video-ltx23-worker = "ltx_video_worker.__main__:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ltx_video_worker"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
