[project]
name = "nexus-3d-trellis2-worker"
version = "0.1.0"
description = "TRELLIS.2 image-to-3D mesh worker for nexus.3d.trellis2. Stdio JSON-RPC. Microsoft TRELLIS.2-4B + O-Voxel sparse structure, native sm_121 (GB10/Blackwell) kernels. fake (no-GPU) mode for CI."
readme = "README.md"
requires-python = ">=3.12,<3.13"
license = { text = "MIT" }

# Base deps cover the torch-free `fake` backend (pure-stdlib GLB + JSON-RPC).
# The real torch/kernel stack lives in the [trellis]/[flash] extras below.
dependencies = [
  "pillow>=10.0",
  "numpy>=1.26,<3.0",
  "huggingface_hub>=0.26",
]

[project.optional-dependencies]
# Proven P0 stack: torch 2.12/cu132 + transformers PINNED 4.56.0 (dinov3 layout).
# Native kernels (cumesh/flex_gemm/o_voxel/nvdiffrast) = vendored wheels (LANE D).
trellis = [
  "torch>=2.12",
  "torchvision>=0.27",
  "transformers==4.56.0",
  "safetensors>=0.4",
  "einops>=0.8",
  "easydict>=1.13",
  "scipy>=1.13",
  "opencv-python-headless>=4.10",
  "trimesh>=4.4",
  "imageio>=2.37",
  "imageio-ffmpeg>=0.6",
  "tqdm>=4.66",
  "kornia>=0.7",
  "timm>=1.0",
]
flash = [
  "flash-attn>=2.8 ; sys_platform == 'linux'",
]
test = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pyyaml>=6.0",
]

[project.scripts]
nexus-3d-trellis2-worker = "trellis2_worker.__main__:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trellis2_worker"]

[tool.hatch.metadata]
allow-direct-references = true

# LANE D owns uv.lock + [tool.uv.sources] wiring for vendored aarch64 kernel +
# flash_attn wheels. The lock needs aarch64 wheels — cannot build on Windows.
[[tool.uv.index]]
name = "pytorch-cu132"
url = "https://download.pytorch.org/whl/cu132"
explicit = true

[tool.uv.sources]
torch = [{ index = "pytorch-cu132" }]
torchvision = [{ index = "pytorch-cu132" }]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
markers = [
    "smoke: end-to-end smoke tests (require GPU + native kernels)",
]
