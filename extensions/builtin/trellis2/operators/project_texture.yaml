spec_version: "0.1"
operator:
  id: trellis2.project_texture
  version: 1.0.0
  display_name: "TRELLIS 2 — Project Photo Texture"
  description: "Projects the real source photo onto an existing mesh's UVs, replacing hallucinated texture on front-facing surfaces with actual photo pixels. Fixes face likeness for a frontal view by baking the camera-aligned photo into the GLB's texture atlas."
  category: mesh.image_to_3d
execution:
  mode: job
  cacheable: false
  resumable: true
inputs:
  - name: mesh
    type: string
    required: true
  - name: image
    type: string
    required: true
  - name: azimuth
    type: number
    required: false
    default: 0
  - name: elevation
    type: number
    required: false
    default: 0
  - name: texture_size
    type: integer
    required: false
    default: 4096
  - name: remove_background
    type: boolean
    required: false
  - name: residency
    type: string
    required: false
outputs:
  - name: mesh_glb
    type: string
  - name: metadata_json
    type: object
resources:
  gpu: true
  min_vram_mb: 10240
