spec_version: "0.1"
operator:
  id: trellis2.generate_3d
  version: 1.0.0
  display_name: "TRELLIS 2 — Generate 3D"
  description: "Generate a 3D mesh (GLB) from a single image via Microsoft TRELLIS.2 (4B flow-matching over an O-Voxel sparse structure)."
  category: mesh.image_to_3d
execution:
  mode: job
  cacheable: false
  resumable: true
inputs:
  - name: image
    type: string
    required: true
  - name: seed
    type: integer
    required: false
  - name: pipeline_type
    type: string
    required: false
  - name: sparse_steps
    type: integer
    required: false
  - name: shape_steps
    type: integer
    required: false
  - name: texture_steps
    type: integer
    required: false
  - name: max_num_tokens
    type: integer
    required: false
  - name: simplify_target
    type: integer
    required: false
  - name: texture_size
    type: integer
    required: false
  - name: texture
    type: boolean
    required: false
  - name: metallic
    type: number
    required: false
  - name: residency
    type: string
    required: false
  - name: sparse_guidance_strength
    type: number
    required: false
  - name: sparse_guidance_rescale
    type: number
    required: false
  - name: sparse_rescale_t
    type: number
    required: false
  - name: sparse_guidance_interval_start
    type: number
    required: false
  - name: sparse_guidance_interval_end
    type: number
    required: false
  - name: shape_guidance_strength
    type: number
    required: false
  - name: shape_guidance_rescale
    type: number
    required: false
  - name: shape_rescale_t
    type: number
    required: false
  - name: shape_guidance_interval_start
    type: number
    required: false
  - name: shape_guidance_interval_end
    type: number
    required: false
  - name: texture_guidance_strength
    type: number
    required: false
  - name: texture_guidance_rescale
    type: number
    required: false
  - name: texture_rescale_t
    type: number
    required: false
  - name: texture_guidance_interval_start
    type: number
    required: false
  - name: texture_guidance_interval_end
    type: number
    required: false
outputs:
  - name: mesh_glb
    type: string
  - name: metadata_json
    type: object
resources:
  gpu: true
  min_vram_mb: 10240
