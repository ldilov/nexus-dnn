# Operator must explicitly enable any safety_tier:requires_local_policy entry
# before serving it to end users. See docs/operator-model-profiles.md.
#
# safety_tier values:
#   mainstream            - permissively-aligned, ship-ready default
#   developer_preview     - dev-only; quality not validated for production
#   requires_local_policy - uncensored / weakly-aligned; operator owns
#                           policy + alignment + abuse-prevention layer
schema_version: 2
default_profile: longcat-planner-default
# n_gpu_layers per profile (Spec 051 D-B):
#   null  -> use the planner's VRAM-probe auto-fit (Spec 051 D-A)
#   -1    -> force full offload (all layers on GPU); skips auto-fit
#   0     -> CPU only
#   N>0   -> explicit layer count; the worker translates to llama.cpp --ngl
#
# context_size is an ADVISORY upper bound. The worker is the authority
# on its actual ctx window (GGUF metadata + llama.cpp build-time
# n_ctx). HttpLeaseClient truncates planner prompts client-side so we
# never knowingly send >context_size, but if profile.context_size
# exceeds worker.n_ctx the worker still truncates silently. Operator
# foot-gun: keep this value in sync with the worker build.

profiles:

  - id: longcat-planner-default
    model: unsloth/gemma-4-E4B-it-GGUF
    quant: Q8_0
    safety_tier: mainstream
    purpose: Multiscene LongCat storyboard prompt planning (default)
    context_size: 8192
    max_output_tokens: 2048
    temperature: 0.2
    n_gpu_layers: null    # use VRAM-probe auto-fit
    required_tags: [text-completion]
    preferred_tags: [json-schema, low-latency]
    notes: |
      Gemma 4 E4B-it (instruction-tuned) at Q8_0 quant. Source:
      https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/tree/main
      Operator-selected default (2026-05-26). Replaces previous
      Qwen3-8B-Q4_K_M default. E4B is a smaller-footprint Gemma 4 variant
      that fits comfortably alongside the LongCat 13B+ render model on
      16 GB VRAM cards when paired with ephemeral lease semantics.
      Re-evaluate JSON-schema adherence under D2 constrained generation
      before lifting Spec 050 PR-4's LONGCAT_LLM_CONSTRAINED default-off.

  - id: longcat-planner-low-ram
    model: Qwen/Qwen3-4B-Instruct-GGUF
    quant: Q4_K_M
    safety_tier: mainstream
    purpose: CPU-only fallback for hosts without a GPU planner slot
    context_size: 4096
    max_output_tokens: 2048
    temperature: 0.2
    required_tags: [text-completion]
    preferred_tags: [json-schema]

  - id: longcat-planner-quality
    model: Qwen/Qwen3-14B-Instruct-GGUF
    quant: Q4_K_M
    safety_tier: mainstream
    purpose: Higher-quality reasoning for >5-scene storyboards
    context_size: 8192
    max_output_tokens: 4096
    temperature: 0.2
    required_tags: [text-completion]
    preferred_tags: [json-schema, long-context]

  - id: longcat-planner-mistral
    model: mistralai/Mistral-Nemo-Instruct-2407-GGUF
    quant: Q4_K_M
    safety_tier: mainstream
    purpose: 128K-context alternative for long creative briefs
    context_size: 32768
    max_output_tokens: 4096
    temperature: 0.2
    required_tags: [text-completion]
    preferred_tags: [long-context]

  - id: longcat-planner-uncensored-lab
    model: cognitivecomputations/Dolphin3.0-Llama3.1-8B-GGUF
    quant: Q4_K_M
    safety_tier: requires_local_policy
    purpose: |
      Creative-lab preset for permissive expansion. NOT a default. Operator
      MUST gate this profile behind a local policy / alignment layer before
      service exposure. The model itself is highly compliant by design.
    context_size: 8192
    max_output_tokens: 2048
    temperature: 0.3
    required_tags: [text-completion]
    preferred_tags: [json-schema]
    requires_acknowledgement: true
