spec_version: '0.1'
recipe:
  id: emotional_dialogue_batch_recipe
  version: 1.0.0
  display_name: "EmotionTTS \u2014 Dialogue Batch"
  summary: "Paste a multi-character script, pick voices + emotion, click Generate\
    \ \u2014 ZIP drops with per-line audio + manifest."
  category: tts.dialogue
workflow_template: "workflows/emotional_dialogue_batch.yaml"
fields:
- id: script
  type: multiline_text
  label: Dialogue script
  placeholder: '[Bob] Hey there

    [Alice] Hello

    ...'
  bind: run.script
- id: parser_mode
  type: enum
  label: Parser mode
  values:
  - dialogue
  - raw_text
  - advanced_tagged
  default: dialogue
  bind: run.parser_mode
- id: output_format
  type: enum
  label: Output format
  values:
  - wav
  - mp3
  - flac
  default: mp3
  bind: run.output_format
- id: speed_factor
  type: slider
  label: Speed
  min: 0.5
  max: 2.0
  step: 0.05
  default: 1.0
  bind: run.speed_factor
- id: global_emotion
  type: emotion_panel
  label: Global emotion
  bind: run.global_emotion
- id: generation_overrides
  type: form_group
  label: Generation settings
  bind: run.generation
  fields:
  - id: temperature
    type: number
    min: 0.0
    max: 2.0
    default: 0.8
  - id: top_p
    type: number
    min: 0.0
    max: 1.0
    default: 0.8
  - id: top_k
    type: integer
    default: 30
  - id: num_beams
    type: integer
    default: 3
actions:
- id: generate
  label: Generate + Export ZIP
  workflow_invoke:
    kind: batch
- id: test_line
  label: Test selected line
  workflow_invoke:
    kind: test_line
# Host RecipeProjection (P7): controls bind to the pinned workflow's input ports;
# the runner sources the synthesis job from the compiler's resolved_inputs.
projection:
  schema_version: 1
  sections:
  - id: script
    title: Script
    order: 0
    control_ids: [script]
  - id: voice_emotion
    title: Voice and Emotion
    order: 1
    control_ids: [global_emotion]
  - id: output
    title: Output
    order: 2
    control_ids: [output_format, speed_factor, speed_mode]
  - id: generation
    title: Generation
    order: 3
    control_ids: [generation]
  - id: advanced
    title: Advanced
    order: 4
    control_ids: [parser_mode, seed_strategy, base_seed, cache_policy]
  controls:
  - control_id: script
    kind: string
    label: Dialogue script
    mode: basic
    default_value: ""
    widget_hint: script_editor
    bindings: ["input:script"]
  - control_id: global_emotion
    kind: string
    label: Global emotion
    mode: basic
    default_value: {}
    widget_hint: emotion_panel
    bindings: ["input:global_emotion"]
  - control_id: output_format
    kind: enum
    label: Output format
    mode: basic
    default_value: mp3
    bindings: ["input:output_format"]
  - control_id: speed_factor
    kind: float
    label: Speed
    mode: basic
    default_value: 1.0
    widget_hint: slider
    bindings: ["input:speed_factor"]
  - control_id: speed_mode
    kind: enum
    label: Speed mode
    mode: advanced
    default_value: preserve_pitch
    bindings: ["input:speed_mode"]
  - control_id: generation
    kind: string
    label: Generation settings
    mode: advanced
    default_value: {}
    widget_hint: form_group
    bindings: ["input:generation"]
  - control_id: parser_mode
    kind: enum
    label: Parser mode
    mode: advanced
    default_value: dialogue
    bindings: ["input:parser_mode"]
  - control_id: seed_strategy
    kind: enum
    label: Seed strategy
    mode: advanced
    default_value: increment_per_line
    bindings: ["input:seed_strategy"]
  - control_id: base_seed
    kind: int
    label: Base seed
    mode: advanced
    default_value: 42
    bindings: ["input:base_seed"]
  - control_id: cache_policy
    kind: enum
    label: Cache policy
    mode: advanced
    default_value: force_regenerate
    bindings: ["input:cache_policy"]
  presets:
  - preset_id: draft
    label: Draft (fast, cached)
    source: recipe
    values:
      output_format: mp3
      speed_factor: 1.0
      cache_policy: use_cache
  - preset_id: final
    label: Final (lossless)
    source: recipe
    values:
      output_format: flac
      cache_policy: force_regenerate
  output:
    primary_artifact: audio
    secondary: []
    preview_style: player
    show_intermediate: false
