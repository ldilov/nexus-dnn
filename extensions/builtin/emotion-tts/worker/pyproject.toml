[project]
name = "emotion-tts-worker"
version = "0.1.0"
description = "IndexTTS-2 synthesis worker for the EmotionTTS Nexus extension (spec 031). Speaks JSON-RPC/NDJSON over stdio to the host-side Rust shim."
requires-python = ">=3.11,<3.12"
readme = "README.md"
license = { text = "GPL-3.0-or-later" }

dependencies = [
  "index-tts",
  "torch>=2.4",
  "torchaudio>=2.4",
  "transformers>=4.45",
  "numpy>=1.26",
  "pydantic>=2.8",
  "ffmpeg-python>=0.2",
  "soundfile>=0.12",
  "pyloudnorm>=0.1.1",
  "silero-vad>=5.1",
  "matplotlib>=3.8",
  "pyyaml>=6.0",
]

[project.optional-dependencies]
deepspeed = ["deepspeed>=0.15"]
denoise = ["rnnoise-wheels>=0.1"]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5",
  "ruff>=0.6",
  "black>=24",
]

[project.scripts]
emotion-tts-worker = "emotion_tts_worker.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/emotion_tts_worker"]

[tool.uv]
managed = true

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchaudio = { index = "pytorch-cu128" }

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "RET", "ASYNC"]
ignore = ["E501"]

[tool.black]
line-length = 120
target-version = ["py311"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
