id: "emotiontts.emotion.resolve@1.0.0"
display_name: "Emotion Resolve"
description: "Resolve per-utterance emotion using the 5-level precedence (inline explicit > inline compat > mapping > global > none)."
inputs:
  - name: resolved_utterances
    type: array
    required: true
  - name: mappings
    type: array
    required: true
  - name: global
    type: object
outputs:
  - name: plans
    type: array
