id: "emotiontts.mapping.resolve@1.0.0"
display_name: "Mapping Resolve"
description: "Resolve character names in a parsed script to voice-asset mappings; surface unresolved characters for pre-flight."
inputs:
  - name: utterances
    type: array
    required: true
  - name: mappings
    type: array
    required: true
outputs:
  - name: resolved
    type: array
  - name: unresolved_characters
    type: array
