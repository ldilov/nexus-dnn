id: "emotiontts.audio.postprocess@1.0.0"
display_name: "Audio Postprocess"
description: "Apply ffmpeg atempo (pitch-preserving speed) + format encode (wav/mp3/flac) per segment."
inputs:
  - name: input_wav_abs
    type: string
    required: true
  - name: output_format
    type: enum
    values: [wav, mp3, flac]
  - name: speed_factor
    type: number
    default: 1.0
outputs:
  - name: output_abs
    type: string
