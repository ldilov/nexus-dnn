spec_version: '0.1'
operator:
  id: emotiontts.audio.postprocess
  version: 1.0.0
  display_name: Audio Postprocess
  description: Apply ffmpeg atempo (pitch-preserving speed) + format encode (wav/mp3/flac)
    per segment. Operator internally fans out across each input path; the workflow
    sees the operator as array-in / array-out.
inputs:
- name: segments
  type: array
  required: true
- name: output_format
  type: enum
  required: false
- name: speed_factor
  type: number
  required: false
  default: 1.0
outputs:
- name: output_paths
  type: array
