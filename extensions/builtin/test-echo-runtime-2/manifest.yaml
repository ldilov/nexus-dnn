spec_version: "0.1"

extension:
  id: "test-echo-runtime-2"
  version: "0.0.1"
  name: "Test Echo Runtime (v2)"
  description: "Second synthetic extension for spec-032 US4 multi-extension tests. Contributes `test.echo.v2`, a prefix-variant of the v1 echo worker. Used exclusively by integration tests — never shipped to users."
  publisher: "nexus"

compatibility:
  host_api: ">=0.1.0"
  protocol: ">=0.1.0"

runtime:
  family: "native"
  entrypoint: "noop"

backend_runtimes:
  - runtime_id: "test.echo.v2"
    display_name: "Test Echo Runtime (v2)"
    family: "python"
    transport: "stdio"
    worker_entrypoint: "worker/src/echo_worker_v2/main.py"
    version_manifest: "backends/echo/versions.yaml"
    capability_tags:
      - "echo"
      - "v2"
    supported_roles:
      - "test"
