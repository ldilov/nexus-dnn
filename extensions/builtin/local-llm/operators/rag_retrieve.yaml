spec_version: "0.1"
operator:
  id: "llm.rag.retrieve"
  version: "1.0.0"
  display_name: "RAG Retrieve"
  description: "Retrieve relevant chunks from a corpus for a given query"
  category: "LLM"
execution:
  mode: "job"
  cacheable: false
  resumable: false
inputs:
  - name: "query"
    type: "text/chat-message"
    required: true
  - name: "corpus_id"
    type: "scalar/string"
    required: true
  - name: "backend_profile"
    type: "model/backend-profile"
    required: true
outputs:
  - name: "chunks"
    type: "text/plain"
  - name: "retrieval_trace"
    type: "text/retrieval-trace"
config_schema:
  type: object
  properties:
    top_k:
      type: integer
      default: 5
      minimum: 1
      maximum: 50
resources:
  gpu: true
