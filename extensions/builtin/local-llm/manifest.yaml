spec_version: "0.1"

extension:
  id: "nexus.local-llm"
  version: "0.2.0"
  name: "Local LLM Chat & RAG"
  description: "Builtin extension for local LLM inference with managed backends, model management, interactive chat, and RAG"
  publisher: "nexus"

compatibility:
  host_api: ">=0.1.0"
  protocol: ">=0.1.0"

runtime:
  family: "native"
  entrypoint: "bin/nexus-local-llm-worker${exe_suffix}"
  environment:
    cuda_version: null
    env_vars: {}

# Draft-07 schema for per-deployment active-model settings. Loose by design:
# typed when present, no required keys, so partial blobs still persist.
config_schema:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    family_id: { type: string }
    variant_id: { type: string }
    tuning: { type: object }
    saved_at: { type: string }
  additionalProperties: true

# Spec 053 — first-class generic dependency graph (parity with the other
# builtins). The host walks this graph for the unified install UX. The
# legacy `runtime_dependencies` block was REMOVED (AC-6.5): its
# `family: "llama.cpp"` row was resolved at enable-time by
# `check_runtime_dependencies` against `host_runtime_installs`, a table
# the spec-035/053 graph never writes — so keeping it blocked activation
# with `RUNTIME_DEPENDENCY_UNMET` even when this graph is satisfied. Models
# are user-selected GGUFs per profile (in-app), so no `model_artifact` step.
dependencies:
  steps:
    - id: python
      type: runtime
      spec:
        family: python
        version: ">=3.11,<3.13"
        accelerator_profiles: [cpu, cuda12, cuda13]

    - id: pkgs
      type: package_set
      requires: [python]
      spec:
        manager: uv
        manifest_path: "worker/pyproject.toml"
        target: extension_local

    - id: validate
      type: validation
      requires: [python, pkgs]
      spec:
        kind: worker_handshake
        timeout_seconds: 60

backend_runtimes:
  - runtime_id: "nexus.local-llm.completions"
    display_name: "Local LLM — Text Completion"
    family: "python"
    transport: "stdio"
    worker_entrypoint: "backends/llamacpp/completions_worker.py"
    # Dedicated version manifest for this runtime — describes the
    # worker-source archive that bundles the Python entrypoint +
    # `worker/pyproject.toml`, NOT the legacy llama.cpp binary releases
    # in `versions.yaml`. Phase C (D17 follow-up) ships the build step
    # that produces the real packaged archive; current asset URLs are
    # placeholders.
    version_manifest: "backends/llamacpp/completions_versions.yaml"
    capability_tags:
      - "text-completion"
    supported_roles:
      - "draft-suggestions"

capabilities:
  - "filesystem.read"
  - "filesystem.write"
  - "network.loopback"
  - "network.remote"
  - "process.spawn"
  - "gpu.compute"
  - "model.registry.read"
  - "storage.schema_contribute"
  - "huggingface.search"
  - "huggingface.install"

operators:
  - file: "operators/chat_turn.yaml"
  - file: "operators/prompt_compose.yaml"
  - file: "operators/output_persist.yaml"
  - file: "operators/embed_text.yaml"
  - file: "operators/rag_retrieve.yaml"

recipes:
  - file: "recipes/local_chat_basic.yaml"
  - file: "recipes/local_chat_rag.yaml"

ui:
  layouts:
    - file: "ui/layouts/chat.yaml"
      default: true
    - file: "ui/layouts/models.yaml"
    - file: "ui/layouts/backends.yaml"
  contributions:
    - file: "ui/open_chat.yaml"
    - file: "ui/model_browser.yaml"
    - file: "ui/backend_settings.yaml"
    - file: "ui/session_inspector.yaml"
    - file: "ui/backend_health.yaml"
    - file: "ui/chat_thread_viewer.yaml"
    - file: "ui/retrieval_trace_viewer.yaml"
    - file: "ui/local_chat_card.yaml"
    - file: "ui/local_rag_card.yaml"
    - file: "ui/metrics_inspector.yaml"

storage:
  spec_version: "0.1"
  engine: "sqlite"
  namespace:
    alias: "local_llm"
    prefix_mode: "host_derived"
  migrations:
    strategy: "sql_file_list"
    files:
      - id: "001_backend_and_models"
        path: "storage/migrations/001_backend_and_models.sql"
      - id: "002_chat_sessions"
        path: "storage/migrations/002_chat_sessions.sql"
      - id: "003_rag"
        path: "storage/migrations/003_rag.sql"
      - id: "004_run_history"
        path: "storage/migrations/004_run_history.sql"
      - id: "005_profile_expansion"
        path: "storage/migrations/005_profile_expansion.sql"
      - id: "006_model_hyperparameters"
        path: "storage/migrations/006_model_hyperparameters.sql"
      - id: "007_generation_settings"
        path: "storage/migrations/007_generation_settings.sql"
      - id: "008_chat_history_persistence"
        path: "storage/migrations/008_chat_history_persistence.sql"
  sql_profile:
    profile: "nexus_sqlite_v1"
