id: "llm.layout.chat"
displayName: "LLM Chat"
description: "Interactive chat with local LLM models. Backends and models are managed from the host app sidebar."
icon: "chat"

# Backends and Models used to be declared here as extension-owned toolbar
# actions + drawers. They now live in the host sidebar (Backends / Models),
# because the host-managed model store (spec 017) and the backend registry
# are cross-extension surfaces. The chat layout should focus on the chat.

root:
  type: workspace_shell
  props:
    eyebrow: "LLM Chat · Local Inference"
  children:
    - type: split_panel
      props:
        direction: horizontal
        sizes: [240, "1fr", 320]
      children:
        - type: stack
          id: sidebar
          props:
            sidebarStyle: true
          children:
            - type: detail_view
              id: sidebar_header
              props:
                headerTitle: "LLM Chat"
                headerSubtitle: "Local Inference Engine"
                headerSubtitleColor: "accent"
                compact: true

            - type: model_selector
              id: model_selector

            - type: action_bar
              id: new_thread_btn
              props:
                actions:
                  - label: "+ New Session"
                    icon: "add"
                    action: "llm.new_thread"
                    variant: "primary"
                    fullWidth: true

            - type: list
              id: thread_list
              props:
                itemType: thread
                sectionTitle: "RECENT HISTORY"
                emptyMessage: "No conversations yet"
                selectable: true
              dataSource:
                method: "llm.list_threads"
                params:
                  archived: false
                  limit: 50
                events: ["session.state.changed"]

        - type: stack
          id: main_area
          children:
            - type: chat_panel
              id: chat_view
              props:
                showStopButton: true
                showRetryButton: true
                streamingEnabled: true
                welcomeIcon: "auto_awesome"
                welcomeTitle: "Initialize Conversation"
                welcomeDescription: "LLM Chat is ready. Select a model and start a conversation."
                modelLabel: "LOCAL_LLM"
                modelChips:
                  - label: "@LOCAL_MODEL"
                    variant: "secondary"
                  - label: "#CHAT"
                    variant: "tertiary"
              dataSource:
                method: "llm.get_thread_messages"
                events: ["chat.stream.delta", "chat.stream.complete"]

        - type: stack
          id: inspector
          props:
            fillHeight: true
          children:
            - type: detail_view
              id: session_details
              props:
                headerTitle: "Session Intel"
                showLiveBadge: true
                sections:
                  - title: null
                    type: metrics
                    metrics:
                      - label: "Latency"
                        value: "--"
                        unit: "ms"
                        color: "primary"
                      - label: "Throughput"
                        value: "--"
                        unit: "t/s"
                        color: "secondary"
                  - title: "Active Context"
                    type: context
                    contextRefs:
                      - label: "session_config"
                        icon: "description"
                        meta: "Read-only"
                      - label: "model_weights"
                        icon: "model_training"
                        meta: "Active"
                  - title: "Focus Vector"
                    type: health
                    health:
                      label: "Convergence"
                      value: 0
                      displayLabel: "OPTIMIZATION"
              dataSource:
                method: "llm.get_session_details"
                events: ["session.state.changed", "backend.health.changed", "backend.metrics.updated"]

            - type: generation_settings_form
              id: generation_settings
