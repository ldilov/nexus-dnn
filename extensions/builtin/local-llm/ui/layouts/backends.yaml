id: "llm.layout.backends"
displayName: "Backends"
description: "Install and manage local LLM inference backends"
icon: "developer_board"

root:
  type: split_panel
  props:
    direction: horizontal
    sizes: [180, "1fr"]
  children:
    - type: stack
      id: left_nav
      props:
        sidebarStyle: true
      children:
        - type: list
          props:
            itemType: nav
            items:
              - id: "backends"
                label: "BACKENDS"
                icon: "developer_board"
                active: true
              - id: "metrics"
                label: "METRICS"
                icon: "monitoring"
              - id: "settings"
                label: "SETTINGS"
                icon: "tune"
            selectable: true

    - type: stack
      id: main_content
      children:
        - type: backend_selector
          id: backend_selection
          props:
            title: "Backend Selection"
            description: "Choose your inference engine. TensorRT provides maximum hardware acceleration for NVIDIA GPUs, while Llama.cpp offers versatile CPU/GPU hybrid offloading."
            backends:
              - id: "tensorrt"
                name: "TensorRT-LLM"
                version: "v0.17"
                description: "NVIDIA high-performance deep learning inference optimizer. Best for A100/H100 clusters requiring sub-millisecond latency and high throughput."
                icon: "memory"
                status: "available"
                optimizedFor: "Ampere/Hopper"
              - id: "llamacpp"
                name: "Llama.cpp"
                version: "vB4970"
                description: "Portable GGML/GGUF inference engine. Ideal for hybrid deployments, edge devices, and environments with limited VRAM. Supports 4-bit and 8-bit quantization."
                icon: "terminal"
                status: "available"
                accelerationOptions:
                  - id: "cpu"
                    label: "CPU only"
                  - id: "cuda12"
                    label: "CUDA 12 (NVIDIA GPU)"
                  - id: "cuda13"
                    label: "CUDA 13 (NVIDIA GPU)"
          dataSource:
            method: "llm.list_runtime_candidates"
            events: ["backend.state.changed", "backend.install.complete"]

        - type: log_viewer
          id: system_log
          props:
            maxLines: 200
            autoScroll: true
            filterLevels: ["info", "warn", "error"]
            showTimestamps: true
          dataSource:
            method: "llm.get_backend_logs"
            refreshInterval: 2
            events: ["backend.logs.appended"]
