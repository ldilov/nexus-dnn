kind: "inspector_panel"
id: "llm.session_inspector"
display_name: "Session Details"
description: "Shows chat session details including backend, model, state, and generation settings"
availability: "available"
metadata:
  target: "chat_session"
  fields:
    - label: "Backend"
      key: "backend_family"
    - label: "Model"
      key: "model_name"
    - label: "Status"
      key: "state"
      format: "status_badge"
    - label: "Messages"
      key: "message_count"
    - label: "Created"
      key: "created_at"
      format: "relative_time"
