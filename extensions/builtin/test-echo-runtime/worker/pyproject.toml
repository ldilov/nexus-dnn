# Spec 032 — minimal pyproject for the test-echo worker. Stdlib only;
# `uv sync` over this file is a fast no-op that exercises the install_deps
# phase without any network IO beyond pip's metadata HEAD requests.

[project]
name = "echo-worker"
version = "0.0.1"
description = "Test echo worker — JSON-RPC stdio loop for spec-032 smoke tests"
requires-python = ">=3.10"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/echo_worker"]
