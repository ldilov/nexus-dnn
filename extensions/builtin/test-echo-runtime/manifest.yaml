spec_version: "0.1"

extension:
  id: "test-echo-runtime"
  version: "0.0.1"
  name: "Test Echo Runtime"
  description: "Synthetic extension that contributes a `test.echo` python backend runtime — used by spec-032 contract tests + as a smoke fixture for the Backends page"
  publisher: "nexus"

compatibility:
  host_api: ">=0.1.0"
  protocol: ">=0.1.0"

runtime:
  family: "native"
  entrypoint: "noop"

backend_runtimes:
  - runtime_id: "test.echo"
    display_name: "Test Echo Runtime"
    family: "python"
    transport: "stdio"
    worker_entrypoint: "worker/src/echo_worker/main.py"
    version_manifest: "backends/echo/versions.yaml"
    capability_tags:
      - "echo"
    supported_roles:
      - "test"
