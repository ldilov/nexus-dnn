specVersion: "0.1"
workflow:
  id: "faceavatar_generate"
  version: "1.0.0"
  title: "FaceAvatar — Photo to Identity Head"

  inputs:
    - name: "image"
      type: "string"
    - name: "params"
      type: "object"

  stages:
    - id: "generate"
      label: "Generate head"

  nodes:
    - id: "generate_head"
      operator: "faceavatar.generate_head@1.0.0"
      stage: "generate"
      inputs:
        image:
          from: "input:image"
        params:
          from: "input:params"
      config: {}

  outputs:
    - name: "mesh_glb"
      from: "generate_head:mesh_glb"
    - name: "metadata_json"
      from: "generate_head:metadata_json"
