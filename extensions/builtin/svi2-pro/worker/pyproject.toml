[project]
name = "nexus-video-svi2-pro-worker"
version = "0.1.0"
description = "Stable Video Infinity 2.0 Pro i2v render worker for nexus.video.svi2-pro. Stdio JSON-RPC. Kijai fp8 Wan2.2-A14B dual-expert + SVI LoRA. fake (no-GPU) mode for CI."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "GPL-3.0-or-later" }

dependencies = [
  "pydantic>=2.8",
  "pyyaml>=6.0",
  "ffmpeg-python>=0.2",
  "pillow>=10.0",
  "numpy>=1.26,<3.0",
  "huggingface_hub>=0.26",
]

[project.optional-dependencies]
diffusers = [
  "torch>=2.12",
  "torchvision>=0.27",
  "safetensors>=0.4",
  "einops>=0.8",
  "sentencepiece>=0.2",
  "protobuf>=4",
  "transformers>=4.41",
  "ftfy>=6.2",
  "regex>=2024.0",
  "av>=12.0",
  "imageio>=2.37",
  "imageio-ffmpeg>=0.6",
  # Transformer SR (DRCT-L/HAT/SwinIR) loader — permissive core archs only.
  # Pure-python; its deps (torch/torchvision/safetensors/numpy/einops) are
  # already pinned above, so it adds no native build on aarch64.
  "spandrel>=0.4.1",
]
flash = [
  "flash-attn ; sys_platform == 'win32'",
  "flash-attn>=2.8 ; sys_platform == 'linux'",
]
sage = [
  # SageAttention v3 (FP4/FP8, Triton-JIT). Vendored wheel only — not on
  # PyPI. cp312-only. win32 today; linux x86_64/aarch64 slots pending the
  # DGX build (see [tool.uv.sources] below). Triton JIT makes it
  # cu-version-agnostic at runtime, so the cu131-tagged win wheel loads
  # against the cu132 torch this worker installs.
  "sageattn3 ; python_version == '3.12' and (sys_platform == 'win32' or (sys_platform == 'linux' and platform_machine == 'aarch64'))",
  # SageAttention v2.2 (INT8-QK / FP8-PV). Vendored aarch64/sm_121 wheel built
  # on GB10 (no upstream wheel); cu13x ABI-locked to torch 2.12 cu132.
  "sageattention ; python_version == '3.12' and sys_platform == 'linux' and platform_machine == 'aarch64'",
]
rtx-upscale = [
  "nvidia-vfx ; sys_platform == 'win32'",
]
test = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "safetensors>=0.4",
  "jsonschema>=4.21,<5",
]

[project.scripts]
nexus-video-svi2-pro-worker = "svi2_video_worker.__main__:cli"
nexus-video-svi2-pro-install = "svi2_video_worker.headless_install:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/svi2_video_worker"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv.sources]
torch = [{ index = "pytorch-cu132" }]
torchvision = [{ index = "pytorch-cu132" }]
flash-attn = [
  # Prebuilt cp312 wheels for ALL THREE platforms (torch 2.12 / cu132) from the
  # repo-global binaries/ tree — svi2 installs 100% with no source build / nvcc.
  # win-amd64 + linux-amd64 from mjun0812/flash-attention-prebuild-wheels;
  # linux-aarch64 built on GB10/CUDA13 (generic 2.8.3, loads vs torch cu132).
  # windows-amd64
  { path = "../../../../binaries/win-amd64/flash_attn-2.8.3+cu132torch2.12-cp312-cp312-win_amd64.whl", marker = "sys_platform == 'win32' and python_version == '3.12'" },
  { path = "../../../../binaries/win-amd64/flash_attn-2.8.3+cu132torch2.12-cp311-cp311-win_amd64.whl", marker = "sys_platform == 'win32' and python_version == '3.11'" },
  # linux-amd64 (x86_64)
  { path = "../../../../binaries/linux-amd64/flash_attn-2.8.3+cu132torch2.12-cp312-cp312-linux_x86_64.whl", marker = "sys_platform == 'linux' and platform_machine == 'x86_64' and python_version == '3.12'" },
  # linux-aarch64
  { path = "../../../../binaries/linux-aarch64/flash_attn-2.8.3-cp312-cp312-linux_aarch64.whl", marker = "sys_platform == 'linux' and platform_machine == 'aarch64' and python_version == '3.12'" },
]
sageattn3 = [
  # SageAttention v3 (FP4, Blackwell) — vendored, not on PyPI. Distribution name
  # `sageattn3` (per wheel METADATA). cp312-only. Compiled fp4 CUDA extensions
  # (.so/.pyd) + triton at runtime; cu131/cu132 ABI-compatible (win=cu131, linux=cu132).
  # windows-amd64
  { path = "../../../../binaries/win-amd64/sageattn3-1.0.0+cu131torch2.12.mengqin-cp312-cp312-win_amd64.whl", marker = "sys_platform == 'win32' and python_version == '3.12'" },
  # linux-amd64 (x86_64) — TODO: no cu132 x86_64 GPU build host yet (deferred).
  # { path = "../../../../binaries/linux-amd64/<sageattn3-linux-x86_64-cp312.whl>", marker = "sys_platform == 'linux' and platform_machine == 'x86_64' and python_version == '3.12'" },
  # linux-aarch64 (GB10/sm_121, built from thu-ml SageAttention sageattention3_blackwell)
  { path = "../../../../binaries/linux-aarch64/sageattn3-1.0.0+cu132torch2.12.thuml-cp312-cp312-linux_aarch64.whl", marker = "sys_platform == 'linux' and platform_machine == 'aarch64' and python_version == '3.12'" },
]
sageattention = [
  # SageAttention 2.2 built on GB10 for sm_121 (TORCH_CUDA_ARCH_LIST=12.1+PTX).
  { path = "../../../../binaries/linux-aarch64/sageattention-2.2.0-cp312-cp312-linux_aarch64.whl", marker = "sys_platform == 'linux' and platform_machine == 'aarch64' and python_version == '3.12'" },
]

[[tool.uv.index]]
name = "pytorch-cu132"
url = "https://download.pytorch.org/whl/cu132"
explicit = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
markers = [
    "smoke: end-to-end smoke tests (may require GPU or external services)",
]
