[project]
name = "nexus-video-svi2-pro-worker"
version = "0.1.0"
description = "Stable Video Infinity 2.0 Pro i2v render worker for nexus.video.svi2-pro. Stdio JSON-RPC. Kijai fp8 Wan2.2-A14B dual-expert + SVI LoRA. fake (no-GPU) mode for CI."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "GPL-3.0-or-later" }

dependencies = [
  "pydantic>=2.8",
  "pyyaml>=6.0",
  "ffmpeg-python>=0.2",
  "pillow>=10.0",
  "numpy>=1.26,<3.0",
  "huggingface_hub>=0.26",
]

[project.optional-dependencies]
diffusers = [
  "torch>=2.12",
  "torchvision>=0.27",
  "safetensors>=0.4",
  "einops>=0.8",
  "sentencepiece>=0.2",
  "protobuf>=4",
  "transformers>=4.41",
  "ftfy>=6.2",
  "regex>=2024.0",
  "av>=12.0",
  "imageio>=2.37",
  "imageio-ffmpeg>=0.6",
]
flash = [
  "flash-attn ; sys_platform == 'win32'",
  "flash-attn>=2.8 ; sys_platform == 'linux'",
]
test = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "safetensors>=0.4",
  "jsonschema>=4.21,<5",
]

[project.scripts]
nexus-video-svi2-pro-worker = "svi2_video_worker.__main__:cli"
nexus-video-svi2-pro-install = "svi2_video_worker.headless_install:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/svi2_video_worker"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv.sources]
torch = [{ index = "pytorch-cu132" }]
torchvision = [{ index = "pytorch-cu132" }]
flash-attn = [
  { path = "../binaries/flash_attn-2.8.3+cu132torch2.12-cp312-cp312-win_amd64.whl", marker = "sys_platform == 'win32' and python_version == '3.12'" },
  { path = "../binaries/flash_attn-2.8.3+cu132torch2.12-cp311-cp311-win_amd64.whl", marker = "sys_platform == 'win32' and python_version == '3.11'" },
]

[[tool.uv.index]]
name = "pytorch-cu132"
url = "https://download.pytorch.org/whl/cu132"
explicit = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
markers = [
    "smoke: end-to-end smoke tests (may require GPU or external services)",
]
