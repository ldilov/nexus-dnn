specVersion: "0.1"
workflow:
  id: "svi2_render"
  version: "1.0.0"
  title: "SVI 2.0 Pro Long Image-to-Video"

  inputs:
    - name: "ref_image_path"
      type: "string"
    - name: "last_image_path"
      type: "string"
    - name: "prompts"
      type: "array"
    - name: "preset_id"
      type: "string"
    - name: "params"
      type: "object"

  stages:
    - id: "anchor"
      label: "Anchor Encode"
    - id: "qwen_edit"
      label: "Qwen Anchor Edit"
    - id: "diffusion"
      label: "Per-Clip Diffusion"
    - id: "stitch"
      label: "Stitch / Crossfade"
    - id: "interpolate"
      label: "Frame Interpolation"
    - id: "mux"
      label: "Mux Output"

  nodes:
    - id: "anchor_encode"
      operator: "svi2.video.anchor@1.0.0"
      stage: "anchor"
      inputs:
        ref_image_path:
          from: "input:ref_image_path"
      config: {}

    - id: "qwen_edit"
      operator: "svi2.video.qwen_edit@1.0.0"
      stage: "qwen_edit"
      inputs:
        anchor_latent:
          from: "anchor_encode:anchor_latent"
        prompts:
          from: "input:prompts"
      config: {}

    - id: "clip_diffusion"
      operator: "svi2.video.diffuse@1.0.0"
      stage: "diffusion"
      inputs:
        anchor:
          from: "qwen_edit:edited_anchor"
        prompts:
          from: "input:prompts"
        params:
          from: "input:params"
      config: {}

    - id: "stitch"
      operator: "svi2.video.stitch@1.0.0"
      stage: "stitch"
      inputs:
        clips:
          from: "clip_diffusion:clip_frames"
      config: {}

    - id: "interpolate"
      operator: "svi2.video.interpolate@1.0.0"
      stage: "interpolate"
      inputs:
        video:
          from: "stitch:stitched_video"
      config: {}

    - id: "mux"
      operator: "svi2.video.mux@1.0.0"
      stage: "mux"
      inputs:
        frames:
          from: "interpolate:interpolated_video"
      config: {}

  outputs:
    - name: "output_path"
      from: "mux:output_path"
    - name: "render_report"
      from: "mux:render_report"
