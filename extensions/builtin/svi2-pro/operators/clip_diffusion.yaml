spec_version: "0.1"
operator:
  id: svi2.video.diffuse
  version: 1.0.0
  display_name: "Per-Clip Diffusion"
  description: "Chain 4n+1-frame SVI clips from the anchor with Wan2.2 diffusion, carrying the rolling latent tail for identity-locked motion."
  category: video.image_to_video
execution:
  mode: job
  cacheable: false
  resumable: true
inputs:
  - name: anchor
    type: object
    required: true
  - name: prompts
    type: array
    required: true
  - name: params
    type: object
    required: false
outputs:
  - name: clip_frames
    type: array
resources:
  gpu: true
  min_vram_mb: 10240
