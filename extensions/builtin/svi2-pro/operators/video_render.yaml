spec_version: "0.1"
operator:
  id: svi2.video.render
  version: 1.0.0
  display_name: "SVI 2.0 Pro Render"
  description: "Render a long, identity-locked image-to-video take by chaining 4n+1-frame SVI clips from one anchor image."
  category: video.image_to_video
execution:
  mode: job
  cacheable: false
  resumable: true
inputs:
  - name: ref_image_path
    type: string
    required: true
  - name: prompts
    type: array
    required: true
  - name: last_image_path
    type: string
    required: false
  - name: num_clips
    type: integer
    required: false
  - name: frames_per_clip
    type: integer
    required: false
  - name: width
    type: integer
    required: false
  - name: height
    type: integer
    required: false
  - name: output_path
    type: string
    required: false
outputs:
  - name: output_path
    type: string
  - name: render_report
    type: object
resources:
  gpu: true
  min_vram_mb: 10240
