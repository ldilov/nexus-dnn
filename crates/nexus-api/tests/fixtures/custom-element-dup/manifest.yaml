spec_version: "0.1"
extension:
  id: "nexus.test.custom-element-dup"
  version: "0.1.0"
  name: "Duplicate Tag Fixture"
  description: "Collides with ext-fixture-widget to exercise tag-uniqueness validation."
  publisher: "nexus-test"
compatibility:
  host_api: ">=0.1.0, <2.0.0"
  protocol: ">=0.1.0, <2.0.0"
  platforms:
    - "linux-x64"
    - "windows-x64"
    - "darwin-arm64"
runtime:
  family: "builtin"
  entrypoint: "noop"
ui:
  assets:
    root: "ui"
  custom_elements:
    - tag: "ext-fixture-widget"
      module: "dup.js"
      entry: "register"
