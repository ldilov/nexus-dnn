  /api/v1/extensions/nexus.audio.emotiontts/deployments/{deployment_id}/runs/{run_id}:
    parameters:
      - { $ref: '#/components/parameters/EmotionTtsDeploymentId' }
      - { in: path, name: run_id, required: true, schema: { type: string } }
    get: { tags: [EmotionTTS], operationId: emotionttsGetRun, responses: { '200': { description: Run detail with utterances. } } }
  /api/v1/extensions/nexus.audio.emotiontts/deployments/{deployment_id}/runs/{run_id}/cancel:
    parameters:
      - { $ref: '#/components/parameters/EmotionTtsDeploymentId' }
