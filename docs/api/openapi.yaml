    get:
      tags: [EmotionTTS, Streams]
      operationId: emotionttsRunProgress
      summary: SSE — segment_started / segment_completed / segment_failed / run_terminal.
      responses:
        '200':
          description: SSE stream of `EmotionTtsSseEvent` frames.
          content:
            text/event-stream:
              schema: { $ref: '#/components/schemas/EmotionTtsSseEvent' }
  /api/v1/extensions/nexus.audio.emotiontts/deployments/{deployment_id}/runs/test-line:
    parameters: [{ $ref: '#/components/parameters/EmotionTtsDeploymentId' }]
    post:
      tags: [EmotionTTS]
      operationId: emotionttsTestLineRun
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/EmotionTtsTestLineBody' } } }
      responses:
        '202':
          description: Queued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId: { type: string }
                  etaSeconds: { type: number }
  /api/v1/extensions/nexus.audio.emotiontts/runs/{run_id}/diagnostics:
    parameters: [{ in: path, name: run_id, required: true, schema: { type: string } }]
    get: { tags: [EmotionTTS], operationId: emotionttsRunDiagnostics, responses: { '200': { description: Alignment diagnostics (placeholder). } } }

  /api/v1/extensions/nexus.audio.emotiontts/deployments/:
    get:  { tags: [EmotionTTS], operationId: emotionttsListDeployments, responses: { '200': { description: Deployments. } } }
    post:
      tags: [EmotionTTS]
      operationId: emotionttsCreateDeployment
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/EmotionTtsCreateDeploymentBody' } } }
      responses: { '201': { description: Created., content: { application/json: { schema: { $ref: '#/components/schemas/EmotionTtsDeploymentRow' } } } } }
  /api/v1/extensions/nexus.audio.emotiontts/deployments/{deployment_id}:
    parameters: [{ $ref: '#/components/parameters/EmotionTtsDeploymentId' }]
    get:
      tags: [EmotionTTS]
      operationId: emotionttsGetDeployment
      responses: { '200': { description: Deployment., content: { application/json: { schema: { $ref: '#/components/schemas/EmotionTtsDeploymentRow' } } } } }
    patch:
      tags: [EmotionTTS]
      operationId: emotionttsPatchDeployment
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/EmotionTtsPatchDeploymentBody' } } }
      responses: { '200': { description: Updated. } }
    delete: { tags: [EmotionTTS], operationId: emotionttsDeleteDeployment, responses: { '204': { description: Deleted. } } }
  /api/v1/extensions/nexus.audio.emotiontts/deployments/{deployment_id}/default-voice:
    parameters: [{ $ref: '#/components/parameters/EmotionTtsDeploymentId' }]
    patch:
      tags: [EmotionTTS]
      operationId: emotionttsSetDefaultVoice
      summary: Set or clear the deployment's quick-mode default voice (Spec 035, 2026-04-28).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [voiceAssetId]
              properties:
                voiceAssetId:
                  type: [string, 'null']
                  description: Voice asset id to use as default, or `null` to clear.
      responses: { '204': { description: Set or cleared. } }
  /api/v1/extensions/nexus.audio.emotiontts/deployments/{deployment_id}/resume:
    parameters: [{ $ref: '#/components/parameters/EmotionTtsDeploymentId' }]
    post:
      tags: [EmotionTTS]
      operationId: emotionttsProbeResume
      responses:
        '200':
          description: Resumability probe.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deploymentId: { type: string }
                  mostRecentRunId: { type: [string, 'null'] }
                  resumable: { type: boolean }

# ─── Components ─────────────────────────────────────────────────────────────
components:

  parameters:
    ExtensionId:
      in: path
      name: id
      required: true
      schema: { type: string }
      description: Extension id (e.g. `nexus.local-llm`).
    GenericExtensionId:
      in: path
      name: ext_id
      required: true
      schema: { type: string }
    InstallId:
      in: path
      name: install_id
      required: true
      schema: { type: string }
    BackendId:
      in: path
      name: backend_id
      required: true
      schema: { type: string }
    ThreadId:
      in: path
      name: thread_id
      required: true
      schema: { type: string }
    EmotionTtsDeploymentId:
      in: path
      name: deployment_id
      required: true
      schema: { type: string }

  requestBodies:
    JsonAny:
      required: true
      content:
        application/json:
          schema: { type: object, additionalProperties: true }

  responses:
    JsonOk:
      description: Standard envelope-wrapped JSON success.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiResponse' }
    HealthOk:
      description: Health.
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, example: ok }
              uptime_secs: { type: integer }
              extensions_loaded: { type: integer }
              workers_active: { type: integer }
    Error:
      description: Envelope-wrapped error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiResponse' }

  schemas:

    # ─── Envelope ─────────────────────────────────────────────────────────
    ApiResponse:
      type: object
      properties:
        data:
          description: Success payload, or `null` on error.
          oneOf:
            - { type: 'null' }
            - { type: object, additionalProperties: true }
            - { type: array, items: { type: object, additionalProperties: true } }
        meta:
          type: object
          properties:
            timestamp: { type: string, format: date-time }
        error:
          oneOf:
            - { type: 'null' }
            - $ref: '#/components/schemas/ApiError'

    ApiError:
      type: object
      required: [code, category, message]
      properties:
        code: { type: string, description: 'Machine-readable error code.' }
        category:
          type: string
          enum: [validation, unauthorized, not_found, conflict, internal]
        message: { type: string }
        details:
          description: Optional structured payload.
          oneOf:
            - { type: 'null' }
            - { type: object, additionalProperties: true }

    # ─── local-llm ────────────────────────────────────────────────────────
    LocalLlmChatThread:
      type: object
      required: [thread_id, extension_id, title_resolved, is_unbound, created_at, updated_at]
      properties:
        thread_id: { type: string }
        extension_id: { type: string, examples: ['nexus.local-llm'] }
        deployment_id: { type: [string, 'null'] }
        install_id: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        title_auto: { type: [string, 'null'] }
        title_resolved: { type: string }
        system_prompt: { type: [string, 'null'] }
        sampler_override: { $ref: '#/components/schemas/LocalLlmSamplerOverride' }
        is_unbound: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    LocalLlmSamplerOverride:
      type: [object, 'null']
      additionalProperties: true

    LocalLlmSamplerBlock:
      type: [object, 'null']
      additionalProperties: true

    LocalLlmCreateThreadRequest:
      type: object
      properties:
        deployment_id: { type: [string, 'null'] }
        install_id: { type: [string, 'null'] }
        title: { type: [string, 'null'] }
        system_prompt: { type: [string, 'null'] }
        sampler_override: { $ref: '#/components/schemas/LocalLlmSamplerOverride' }

    LocalLlmPatchThreadRequest:
      type: object
      properties:
        title: { type: [string, 'null'] }
        sampler_override: { $ref: '#/components/schemas/LocalLlmSamplerOverride' }
        clear_sampler_override: { type: boolean, default: false }
        attach_to_current_deployment: { type: boolean, default: false }

    LocalLlmListThreadsResponse:
      type: object
      required: [threads, has_more]
      properties:
        threads: { type: array, items: { $ref: '#/components/schemas/LocalLlmChatThread' } }
        has_more: { type: boolean }
        next_before_updated_at: { type: [string, 'null'], format: date-time }

    LocalLlmChatMessage:
      type: object
      required: [message_id, thread_id, ordinal, role, content, is_partial, created_at]
      properties:
        message_id: { type: string }
        thread_id: { type: string }
        ordinal: { type: integer, minimum: 0 }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        sampler_effective: { $ref: '#/components/schemas/LocalLlmSamplerBlock' }
        is_partial: { type: boolean }
        retry_of_message_id: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }

    LocalLlmAppendMessageRequest:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        sampler_effective: { $ref: '#/components/schemas/LocalLlmSamplerBlock' }
        is_partial: { type: boolean, default: false }
        retry_of_message_id: { type: [string, 'null'] }

    LocalLlmListMessagesResponse:
      type: object
      required: [messages, has_more]
      properties:
        messages: { type: array, items: { $ref: '#/components/schemas/LocalLlmChatMessage' } }
        has_more: { type: boolean }
        next_after_ordinal: { type: [integer, 'null'] }

    LocalLlmGenerationParams:
      type: object
      properties:
        temperature: { type: number, default: 0.8 }
        top_p: { type: number, default: 0.95 }
        top_k: { type: integer, default: 40 }
        max_tokens: { type: integer, default: 4096 }
        repeat_penalty: { type: number, default: 1.1 }
        system_prompt: { type: string, default: 'You are a helpful assistant.' }

    LocalLlmActiveModelBinding:
      type: object
      required: [family_id, variant_id, artifact_id, absolute_path, label]
      properties:
        family_id: { type: string }
        variant_id: { type: string }
        artifact_id: { type: string }
        absolute_path: { type: string }
        label: { type: string }

    LocalLlmRuntimeTuning:
      type: object
      properties:
        n_gpu_layers: { type: integer }
        threads: { type: integer }
        flash_attn: { type: boolean }
        ctx_size: { type: integer }
        cache_type_k: { type: string, enum: [fp16, q8_0, q4_0] }
        cache_type_v: { type: string, enum: [fp16, q8_0, q4_0] }

    LocalLlmSetActiveModelBody:
      type: object
      required: [family_id, variant_id]
      properties:
        family_id: { type: string }
        variant_id: { type: string }
        runtime: { $ref: '#/components/schemas/LocalLlmRuntimeTuning' }

    LocalLlmActiveModelStatus:
      type: object
      properties:
        state:
          oneOf:
            - type: object
              required: [kind, family_id, variant_id, label]
              properties:
                kind: { const: Loading }
                family_id: { type: string }
                variant_id: { type: string }
                label: { type: string }
            - type: object
              required: [kind, binding]
              properties:
                kind: { const: Ready }
                binding: { $ref: '#/components/schemas/LocalLlmActiveModelBinding' }
                lease_id: { type: [string, 'null'] }
                port: { type: integer }
            - type: object
              required: [kind, family_id, variant_id, reason]
              properties:
                kind: { const: Failed }
                family_id: { type: string }
                variant_id: { type: string }
                reason: { type: string }

    # ─── emotion-tts (camelCase wire format) ──────────────────────────────
    EmotionTtsCharacterMappingRow:
      type: object
      properties:
        mappingId: { type: string }
        deploymentId: { type: string }
        characterName: { type: string }
        speakerVoiceAssetId: { type: string }
        defaultEmotionMode: { type: string, enum: [none, audio_ref, vector_preset, qwen_template] }
        defaultEmotionVoiceAssetId: { type: [string, 'null'] }
        defaultVectorPresetId: { type: [string, 'null'] }
        defaultQwenTemplate: { type: [string, 'null'] }
        defaultSpeedFactor: { type: number, minimum: 0.5, maximum: 2.0 }
        isActive: { type: boolean }
        notes: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    EmotionTtsMappingsList:
      type: object
      properties:
        mappings: { type: array, items: { $ref: '#/components/schemas/EmotionTtsCharacterMappingRow' } }

    EmotionTtsCreateMappingBody:
      type: object
      required: [deploymentId, characterName, speakerVoiceAssetId]
      properties:
        deploymentId: { type: string }
        characterName: { type: string }
        speakerVoiceAssetId: { type: string }
        defaultEmotionMode: { type: string, enum: [none, audio_ref, vector_preset, qwen_template], default: none }
        defaultEmotionVoiceAssetId: { type: [string, 'null'] }
        defaultVectorPresetId: { type: [string, 'null'] }
        defaultQwenTemplate: { type: [string, 'null'] }
        defaultSpeedFactor: { type: number, minimum: 0.5, maximum: 2.0 }
        notes: { type: [string, 'null'] }

    EmotionTtsPatchMappingBody:
      type: object
      properties:
        characterName: { type: string }
        speakerVoiceAssetId: { type: string }
        defaultEmotionMode: { type: string, enum: [none, audio_ref, vector_preset, qwen_template] }
        defaultEmotionVoiceAssetId: { type: [string, 'null'] }
        defaultVectorPresetId: { type: [string, 'null'] }
        defaultQwenTemplate: { type: [string, 'null'] }
        defaultSpeedFactor: { type: number, minimum: 0.5, maximum: 2.0 }
        notes: { type: [string, 'null'] }

    EmotionTtsDuplicateMappingBody:
      type: object
      required: [targetDeploymentId]
      properties:
        targetDeploymentId: { type: string }
        overrideCharacterName: { type: [string, 'null'] }

    EmotionTtsImportMappingsBody:
      type: object
      required: [targetDeploymentId, mappings, conflictStrategy]
      properties:
        targetDeploymentId: { type: string }
        mappings: { type: array, items: { type: object, additionalProperties: true } }
        conflictStrategy: { type: string, enum: [error, skip, replace] }

    EmotionTtsVectorPresetRow:
      type: object
      properties:
        presetId: { type: string }
        deploymentId: { type: string }
        presetName: { type: string }
        vector:
          type: array
          items: { type: number, minimum: 0, maximum: 1 }
          minItems: 8
          maxItems: 8
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    EmotionTtsCreatePresetBody:
      type: object
      required: [deploymentId, presetName, vector]
      properties:
        deploymentId: { type: string }
        presetName: { type: string, maxLength: 120 }
        vector:
          type: array
          items: { type: number, minimum: 0, maximum: 1 }
          minItems: 8
          maxItems: 8

    EmotionTtsPatchPresetBody:
      type: object
      properties:
        presetName: { type: string, maxLength: 120 }
        vector:
          type: array
          items: { type: number, minimum: 0, maximum: 1 }
          minItems: 8
          maxItems: 8

    EmotionTtsVoiceAssetRow:
      type: object
      properties:
        voiceAssetId: { type: string }
        deploymentId: { type: string }
        displayName: { type: string }
        kind: { type: string, enum: [speaker, emotion, mixed] }
        audioArtifactRef: { type: string }
        contentSha256: { type: string }
        referenceText: { type: [string, 'null'] }
        sampleRate: { type: [integer, 'null'] }
        durationMs: { type: [integer, 'null'] }
        sourceType: { type: string }
        notes: { type: [string, 'null'] }
        isActive: { type: boolean }
        preprocessedArtifactRef: { type: [string, 'null'] }
        preprocessingReport:
          type: [object, 'null']
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    EmotionTtsDeploymentRow:
      type: object
      properties:
        deploymentId: { type: string }
        hostExtensionInstanceRef: { type: string }
        displayName: { type: string }
        backendRuntimePreference: { type: string }
        defaultOutputFormat: { type: string, enum: [wav, mp3, flac] }
        defaultSpeedFactor: { type: number, minimum: 0.5, maximum: 2.0 }
        defaultGenerationOverridesJson: { type: [object, 'null'], additionalProperties: true }
        mostRecentRunId: { type: [string, 'null'] }
        partialRunId: { type: [string, 'null'] }
        referencePreprocessEnabled: { type: boolean }
        oasEnabled: { type: boolean }
        compileGptEnabled: { type: boolean }
        modelFamily:
          type: [string, 'null']
          description: Active model family for this deployment. Falls back to the extension's `DEFAULT_MODEL_FAMILY` constant when null.
        oasThresholdLearned: { type: [number, 'null'] }
        oasSamplesSeen: { type: integer, minimum: 0 }
        defaultVoiceAssetId:
          type: [string, 'null']
          description: Quick-mode default voice (Spec 035, 2026-04-28). `null` if unset.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    EmotionTtsCreateDeploymentBody:
      type: object
      required: [displayName, hostExtensionInstanceRef, backendRuntimePreference]
      properties:
        displayName: { type: string }
        hostExtensionInstanceRef: { type: string }
        backendRuntimePreference: { type: string }
        defaultOutputFormat: { type: string, enum: [wav, mp3, flac], default: mp3 }
        defaultSpeedFactor: { type: number, minimum: 0.5, maximum: 2.0, default: 1.0 }
        modelFamily: { type: string }

    EmotionTtsPatchDeploymentBody:
      type: object
      properties:
        displayName: { type: string }
        backendRuntimePreference: { type: string }
        defaultOutputFormat: { type: string, enum: [wav, mp3, flac] }
        defaultSpeedFactor: { type: number, minimum: 0.5, maximum: 2.0 }
        defaultGenerationOverrides:
          type: [object, 'null']
          additionalProperties: true

    EmotionTtsCreateRunBody:
      type: object
      required: [script]
      properties:
        script: { type: string }
        parserMode: { type: string, enum: [dialogue, raw_text, advanced_tagged], default: dialogue }
        outputFormat: { type: string, enum: [wav, mp3, flac] }
        speedFactor: { type: number, minimum: 0.5, maximum: 2.0, default: 1.0 }
        speedMode: { type: string, default: preserve_pitch }
        seedStrategy: { type: string, enum: [increment_per_line, fixed, custom], default: increment_per_line }
        baseSeed: { type: integer, default: 42 }
        cachePolicy: { type: string, enum: [use_cache, force_regenerate, read_only_cache], default: use_cache }
        globalEmotion:
          type: [object, 'null']
          additionalProperties: true
        generation:
          type: [object, 'null']
          additionalProperties: true

    EmotionTtsCreateRunResponse:
      type: object
      properties:
        runId: { type: string }
        queuePosition: { type: integer, minimum: 0 }
        preflight:
          type: object
          properties:
            unresolvedCharacters: { type: array, items: { type: string } }
            predictedFilenames: { type: array, items: { type: string } }
            parserWarnings: { type: array, items: { type: object, additionalProperties: true } }

    EmotionTtsTestLineBody:
      type: object
      required: [line]
      properties:
        line: { type: string }
        outputFormat: { type: string, enum: [wav, mp3, flac] }
        globalEmotion:
          type: [object, 'null']
          additionalProperties: true
        generation:
          type: [object, 'null']
          additionalProperties: true

    EmotionTtsSseEvent:
      description: Frame on `/runs/{run_id}/progress` SSE stream.
      oneOf:
        - type: object
          required: [type, run_id, utterance_id, global_index]
          properties:
            type: { const: segment_started }
            run_id: { type: string }
            utterance_id: { type: string }
            global_index: { type: integer }
        - type: object
          required: [type, run_id, utterance_id, global_index, duration_ms]
          properties:
            type: { const: segment_completed }
            run_id: { type: string }
            utterance_id: { type: string }
            global_index: { type: integer }
            duration_ms: { type: integer }
        - type: object
          required: [type, run_id, utterance_id, global_index, failure_category]
          properties:
            type: { const: segment_failed }
            run_id: { type: string }
            utterance_id: { type: string }
            global_index: { type: integer }
            failure_category: { type: string }
            failure_detail: { type: [string, 'null'] }
        - type: object
          required: [type, run_id, status]
          properties:
            type: { const: run_terminal }
            run_id: { type: string }
            status: { type: string, enum: [completed, failed, cancelled, partial] }
