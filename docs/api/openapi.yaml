  # ─── Builtin: nexus.local-llm ─────────────────────────────────────────────
  /api/v1/extensions/nexus.local-llm/chat/threads:
    get:
      tags: [LocalLLM]
      operationId: localLlmListThreads
      parameters:
        - { in: query, name: deployment_id, schema: { type: string } }
        - { in: query, name: exclude_unbound, schema: { type: boolean, default: false } }
        - { in: query, name: limit, schema: { type: integer, default: 50, minimum: 1 } }
        - { in: query, name: before_updated_at, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: List of threads.
          content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmListThreadsResponse' } } }
    post:
      tags: [LocalLLM]
      operationId: localLlmCreateThread
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmCreateThreadRequest' } } }
      responses:
        '201':
          description: Created.
          content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmChatThread' } } }
  /api/v1/extensions/nexus.local-llm/chat/threads/{thread_id}:
    parameters: [{ $ref: '#/components/parameters/ThreadId' }]
    get:
      tags: [LocalLLM]
      operationId: localLlmGetThread
      responses:
        '200':
          description: Thread.
          content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmChatThread' } } }
        '404': { $ref: '#/components/responses/Error' }
    patch:
      tags: [LocalLLM]
      operationId: localLlmPatchThread
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmPatchThreadRequest' } } }
      responses:
        '200':
          description: Updated.
          content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmChatThread' } } }
    delete:
      tags: [LocalLLM]
      operationId: localLlmDeleteThread
      responses: { '204': { description: Deleted. } }
  /api/v1/extensions/nexus.local-llm/chat/threads/{thread_id}/messages:
    parameters: [{ $ref: '#/components/parameters/ThreadId' }]
    get:
      tags: [LocalLLM]
      operationId: localLlmListMessages
      parameters:
        - { in: query, name: after_ordinal, schema: { type: integer, minimum: 0 } }
        - { in: query, name: limit, schema: { type: integer, default: 100, minimum: 1 } }
      responses:
        '200':
          description: Messages.
          content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmListMessagesResponse' } } }
    post:
      tags: [LocalLLM]
      operationId: localLlmAppendMessage
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmAppendMessageRequest' } } }
      responses:
        '201':
          description: Created.
          content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmChatMessage' } } }
  /api/v1/extensions/nexus.local-llm/chat/threads/{thread_id}/generation_settings:
    parameters: [{ $ref: '#/components/parameters/ThreadId' }]
    get:
      tags: [LocalLLM]
      operationId: localLlmGetGenerationSettings
      responses:
        '200':
          description: Settings.
          content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmGenerationParams' } } }
    put:
      tags: [LocalLLM]
      operationId: localLlmSetGenerationSettings
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmGenerationParams' } } }
      responses:
        '200':
          description: Settings echoed.
          content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmGenerationParams' } } }
  /api/v1/extensions/nexus.local-llm/chat/threads/{thread_id}/active_model:
    parameters: [{ $ref: '#/components/parameters/ThreadId' }]
    get:
      tags: [LocalLLM]
      operationId: localLlmGetActiveModel
      responses:
        '200':
          description: Active binding (`null` if none).
          content: { application/json: { schema: { oneOf: [ { $ref: '#/components/schemas/LocalLlmActiveModelBinding' }, { type: 'null' } ] } } }
    put:
      tags: [LocalLLM]
      operationId: localLlmSetActiveModel
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmSetActiveModelBody' } } }
      responses:
        '202':
          description: Async load started.
          content: { application/json: { schema: { $ref: '#/components/schemas/LocalLlmActiveModelStatus' } } }
    delete:
      tags: [LocalLLM]
      operationId: localLlmUnloadActiveModel
      responses: { '204': { description: Unloaded. } }
  /api/v1/extensions/nexus.local-llm/chat/threads/{thread_id}/active_model/status:
    parameters: [{ $ref: '#/components/parameters/ThreadId' }]
    get:
      tags: [LocalLLM]
