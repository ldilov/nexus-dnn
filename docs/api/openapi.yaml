openapi: 3.1.0
info:
  title: Nexus DNN API
  version: 0.1.0
  description: |
    Hand-maintained OpenAPI 3.1 spec for the Nexus DNN host process and the two
    builtin extensions (`nexus.local-llm`, `nexus.audio.emotiontts`).

    See [`API.md`](./API.md) for the narrative reference. This file is the
    machine-readable companion — clients can use `openapi-generator-cli`,
    `oats`, `hey-api`, or any compatible tool to derive a typed client.

    All JSON responses (success and error) are wrapped in the `ApiResponse`
    envelope (`#/components/schemas/ApiResponse`) unless explicitly marked as
    `application/zip`, `application/octet-stream`, `text/event-stream`, or
    `multipart/form-data`. Per-route response schemas describe the shape of the
    `data` field inside the envelope; the envelope itself is omitted from each
    response definition for brevity.

    **Status:** Living document, last reconciled `2026-04-28` against branch
    `035-extension-dependency-installer`. Run `cargo run -p nexus-api --bin
    api-doc-check` to verify drift.
  contact:
    name: Nexus DNN
    url: https://github.com/lazardilov/nexus-dnn
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html

servers:
  - url: http://127.0.0.1:3000
    description: Default loopback bind. Configure via `NEXUS_PORT`.

tags:
  - name: Health
    description: Liveness, system info, metrics.
  - name: Extensions
    description: Extension lifecycle (discover, enable, disable, install-from-zip).
  - name: ExtensionDependencies
    description: Spec 035 dependency installer.
  - name: ExtensionStorage
    description: Storage namespace contributions per extension.
  - name: ExtensionUI
    description: Extension UI bundles + custom-element catalog.
  - name: ExtensionRouter
    description: Generic pass-through to extension-owned routes.
  - name: Operators
    description: Operator catalog (workflow node types).
  - name: Recipes
    description: Recipe catalog (canonical workflow templates).
  - name: Workflows
    description: User-authored workflow documents + canvas.
  - name: Modules
    description: Aggregated module gallery (Spec 019).
  - name: Deployments
    description: Configured runnable instances of recipes/workflows.
  - name: Runs
    description: Host-level run lifecycle.
  - name: Artifacts
    description: Artifact metadata, blob, content, lineage.
  - name: BackendRuntimes
    description: Spec 032 generic backend-runtime catalog and lease API.
  - name: BackendsLegacy
    description: Deprecated `/api/v1/llm/backends/*` (sunset 2026-05-13).
  - name: HostModels
    description: Host model registry + leases (Spec 031).
  - name: ModelStore
    description: Spec 025 search + downloads.
  - name: HuggingFace
    description: HuggingFace integration (per-extension).
  - name: UI
    description: UI components, contributions, layouts.
  - name: HostIntrospection
    description: `/api/host/*` facts (Spec 028).
  - name: Streams
    description: WebSocket and SSE streams.
  - name: LocalLLM
    description: Builtin extension `nexus.local-llm` — chat threads, messages, model binding.
  - name: EmotionTTS
    description: Builtin extension `nexus.audio.emotiontts` — runs, voice assets, mappings, exports.

paths:

  # ─── Health ────────────────────────────────────────────────────────────────
  /api/v1/health:
    get:
      tags: [Health]
      operationId: health
      summary: Liveness + uptime.
      responses: { '200': { $ref: '#/components/responses/HealthOk' } }
  /api/v1/metrics:
    get:
      tags: [Health]
      operationId: metrics
      summary: Process and registry metrics.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/system/info:
    get:
      tags: [Health]
      operationId: systemInfo
      summary: OS, host version, build commit.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/tools:
    get:
      tags: [Health]
      operationId: listTools
      summary: List host-registered tools (Spec 028).
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  # ─── Extensions ───────────────────────────────────────────────────────────
  /api/v1/extensions:
    get:
      tags: [Extensions]
      operationId: listExtensions
      summary: List discovered extensions with registry status.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    get:
      tags: [Extensions]
      operationId: getExtension
      summary: Full record for one extension.
      responses: { '200': { $ref: '#/components/responses/JsonOk' }, '404': { $ref: '#/components/responses/Error' } }
  /api/v1/extensions/refresh:
    post:
      tags: [Extensions]
      operationId: refreshExtensions
      summary: Re-discover extensions on disk.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/reveal:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [Extensions]
      operationId: revealExtensionFolder
      summary: Open extension folder in OS file explorer.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/enable:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [Extensions]
      operationId: enableExtension
      summary: Enable; checks dependencies, emits `extension_activated`.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/disable:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [Extensions]
      operationId: disableExtension
      summary: Disable; releases leases and unmounts router.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/install-from-zip:
    post:
      tags: [Extensions]
      operationId: installFromZip
      summary: Install extension from zip body (max 64 MiB).
      requestBody:
        required: true
        content:
          application/zip:
            schema: { type: string, format: binary }
      responses: { '200': { $ref: '#/components/responses/JsonOk' }, '413': { $ref: '#/components/responses/Error' } }

  # ─── Extension dependencies (Spec 035) ────────────────────────────────────
  /api/v1/extensions/{id}/dependencies:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    get:
      tags: [ExtensionDependencies]
      operationId: listExtensionDependencies
      summary: List dependency steps with status.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/install:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [ExtensionDependencies]
      operationId: startExtensionInstall
      summary: Start the install plan. SSE progress on `/api/v1/events`.
      responses: { '202': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/install/steps/{step_id}/retry:
    parameters:
      - { $ref: '#/components/parameters/ExtensionId' }
      - in: path
        name: step_id
        required: true
        schema: { type: string }
    post:
      tags: [ExtensionDependencies]
      operationId: retryExtensionInstallStep
      summary: Retry a failed install step in place.
      responses: { '202': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/install/cancel:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [ExtensionDependencies]
      operationId: cancelExtensionInstall
      summary: Cancel the in-flight install.
      responses: { '202': { $ref: '#/components/responses/JsonOk' } }

  # ─── Extension storage contributions ──────────────────────────────────────
  /api/v1/extensions/{id}/storage:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    get:
      tags: [ExtensionStorage]
      operationId: getExtensionStorage
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/storage/validate:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [ExtensionStorage]
      operationId: validateExtensionStorage
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/storage/apply:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [ExtensionStorage]
      operationId: applyExtensionStorage
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/storage/verify:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [ExtensionStorage]
      operationId: verifyExtensionStorage
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/storage/uninstall:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [ExtensionStorage]
      operationId: uninstallExtensionStorage
      summary: Drop the namespace. **Destructive.**
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/storage/namespaces:
    get:
      tags: [ExtensionStorage]
      operationId: listStorageNamespaces
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  # ─── Extension UI ─────────────────────────────────────────────────────────
  /api/v1/ui/extension-components:
    get:
      tags: [ExtensionUI]
      operationId: listExtensionComponents
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
  /api/v1/extensions/{id}/ui/{path}:
    parameters:
      - { $ref: '#/components/parameters/ExtensionId' }
      - in: path
        name: path
        required: true
        allowReserved: true
        schema: { type: string }
        description: 'Extension asset sub-path (catch-all). May contain `/` separators; clients must NOT percent-encode them.'
    get:
      tags: [ExtensionUI]
      operationId: getExtensionAsset
      responses:
        '200': { description: Asset stream., content: { 'application/octet-stream': { schema: { type: string, format: binary } } } }
        '404': { $ref: '#/components/responses/Error' }
  /api/v1/extensions/{id}/reload:
    parameters: [{ $ref: '#/components/parameters/ExtensionId' }]
    post:
      tags: [ExtensionUI]
      operationId: reloadExtension
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  # ─── Generic extension router ─────────────────────────────────────────────
  # NOTE: The generic catch-all `/api/v1/extensions/{ext_id}/{rest}` exists
  # at runtime (any extension's router is mounted there), but is intentionally
  # NOT enumerated as a path item to avoid OpenAPI's "paths MUST be unambiguous"
  # rule colliding with the concrete `nexus.local-llm` and `nexus.audio.emotiontts`
  # paths below. Treat any extension's full surface as "everything under
  # `/api/v1/extensions/<ext_id>/`" — see API.md § Generic extension router.

  # ─── Operators / Recipes ──────────────────────────────────────────────────
  /api/v1/operators:
    get: { tags: [Operators], operationId: listOperators, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/operators/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get: { tags: [Operators], operationId: getOperator, responses: { '200': { $ref: '#/components/responses/JsonOk' }, '404': { $ref: '#/components/responses/Error' } } }
  /api/v1/recipes:
    get: { tags: [Recipes], operationId: listRecipes, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/recipes/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get: { tags: [Recipes], operationId: getRecipe, responses: { '200': { $ref: '#/components/responses/JsonOk' }, '404': { $ref: '#/components/responses/Error' } } }

  # ─── Workflows ────────────────────────────────────────────────────────────
  /api/v1/workflows:
    get:  { tags: [Workflows], operationId: listWorkflows, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
    post: { tags: [Workflows], operationId: createWorkflow, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '201': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/workflows/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get:    { tags: [Workflows], operationId: getWorkflow, responses: { '200': { $ref: '#/components/responses/JsonOk' }, '404': { $ref: '#/components/responses/Error' } } }
    put:    { tags: [Workflows], operationId: updateWorkflow, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
    delete: { tags: [Workflows], operationId: deleteWorkflow, responses: { '204': { description: Deleted. } } }
  /api/v1/workflows/{id}/graph:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    put: { tags: [Workflows], operationId: updateWorkflowGraph, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/workflows/{id}/canvas:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get: { tags: [Workflows], operationId: getWorkflowCanvas, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
    put: { tags: [Workflows], operationId: putWorkflowCanvas, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/workflows/{id}/revert:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post: { tags: [Workflows], operationId: revertWorkflow, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/workflows/validate:
    post: { tags: [Workflows], operationId: validateWorkflow, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/workflows/validate-payload:
    post: { tags: [Workflows], operationId: validateWorkflowPayload, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }

  # ─── Modules ──────────────────────────────────────────────────────────────
  /api/v1/modules:
    get: { tags: [Modules], operationId: listModules, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/modules/{module_id}:
    parameters: [{ in: path, name: module_id, required: true, schema: { type: string } }]
    get: { tags: [Modules], operationId: getModule, responses: { '200': { $ref: '#/components/responses/JsonOk' }, '404': { $ref: '#/components/responses/Error' } } }
  /api/v1/modules/{module_id}/blueprint:
    parameters: [{ in: path, name: module_id, required: true, schema: { type: string } }]
    get: { tags: [Modules], operationId: getModuleBlueprint, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/modules/{module_id}/deployments:
    parameters: [{ in: path, name: module_id, required: true, schema: { type: string } }]
    post: { tags: [Modules], operationId: createDeploymentFromModule, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '201': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/modules/{module_id}/blueprint/dry-run:
    parameters: [{ in: path, name: module_id, required: true, schema: { type: string } }]
    post: { tags: [Modules], operationId: dryRunModuleBlueprint, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/modules/{module_id}/materialize:
    parameters: [{ in: path, name: module_id, required: true, schema: { type: string }, description: 'Format: `user:draft:{uuid}`' }]
    post: { tags: [Modules], operationId: materializeDraftModule, responses: { '201': { $ref: '#/components/responses/JsonOk' } } }

  # ─── Deployments ──────────────────────────────────────────────────────────
  /api/v1/deployments:
    get:  { tags: [Deployments], operationId: listDeployments, parameters: [{ in: query, name: workspace_id, schema: { type: string } }, { in: query, name: state, schema: { type: string } }, { in: query, name: limit, schema: { type: integer, minimum: 1 } }], responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
    post: { tags: [Deployments], operationId: createDeployment, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '201': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/deployments/import:
    post: { tags: [Deployments], operationId: importDeployment, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '201': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/deployments/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get:   { tags: [Deployments], operationId: getDeployment, responses: { '200': { $ref: '#/components/responses/JsonOk' }, '404': { $ref: '#/components/responses/Error' } } }
    patch: { tags: [Deployments], operationId: patchDeployment, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/deployments/{id}/revisions/{rev}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
      - { in: path, name: rev, required: true, schema: { type: string } }
    get: { tags: [Deployments], operationId: getDeploymentRevision, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/deployments/{id}/revisions:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post: { tags: [Deployments], operationId: saveDeploymentRevision, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '201': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/deployments/{id}/validate:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post: { tags: [Deployments], operationId: validateDeployment, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/deployments/{id}/load:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post: { tags: [Deployments], operationId: loadDeployment, responses: { '202': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/deployments/{id}/runs:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post: { tags: [Deployments], operationId: createDeploymentRun, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '202': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/deployments/{id}/clone:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post: { tags: [Deployments], operationId: cloneDeployment, responses: { '201': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/deployments/{id}/export:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post: { tags: [Deployments], operationId: exportDeployment, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }

  # ─── Runs ─────────────────────────────────────────────────────────────────
  /api/v1/runs:
    get:
      tags: [Runs]
      operationId: listRuns
      parameters:
        - { in: query, name: deployment_id, schema: { type: string } }
        - { in: query, name: state, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1 } }
        - { in: query, name: before_at, schema: { type: string, format: date-time } }
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
    post: { tags: [Runs], operationId: createRun, requestBody: { $ref: '#/components/requestBodies/JsonAny' }, responses: { '202': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/runs/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get: { tags: [Runs], operationId: getRun, responses: { '200': { $ref: '#/components/responses/JsonOk' }, '404': { $ref: '#/components/responses/Error' } } }
  /api/v1/runs/{id}/cancel:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post: { tags: [Runs], operationId: cancelRun, responses: { '202': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/runs/{id}/retry:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    post: { tags: [Runs], operationId: retryRun, responses: { '202': { $ref: '#/components/responses/JsonOk' } } }

  # ─── Artifacts ────────────────────────────────────────────────────────────
  /api/v1/artifacts:
    get: { tags: [Artifacts], operationId: listArtifacts, parameters: [{ in: query, name: run_id, schema: { type: string } }, { in: query, name: type, schema: { type: string } }, { in: query, name: node_id, schema: { type: string } }], responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/artifacts/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get: { tags: [Artifacts], operationId: getArtifact, responses: { '200': { $ref: '#/components/responses/JsonOk' }, '404': { $ref: '#/components/responses/Error' } } }
  /api/v1/artifacts/{id}/blob:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get:
      tags: [Artifacts]
      operationId: getArtifactBlob
      responses:
        '200':
          description: Raw artifact bytes.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
  /api/v1/artifacts/{id}/content:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get: { tags: [Artifacts], operationId: getArtifactContent, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/artifacts/{id}/lineage:
    parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
    get: { tags: [Artifacts], operationId: getArtifactLineage, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }

  # ─── Backend runtimes (Spec 032) ──────────────────────────────────────────
  /api/v1/backend-runtimes:
    get: { tags: [BackendRuntimes], operationId: listBackendRuntimes, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/backend-runtimes/{runtime_id}:
    parameters: [{ in: path, name: runtime_id, required: true, schema: { type: string } }]
    get: { tags: [BackendRuntimes], operationId: getBackendRuntime, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/backend-runtimes/{runtime_id}/install:
    parameters: [{ in: path, name: runtime_id, required: true, schema: { type: string } }]
    post: { tags: [BackendRuntimes], operationId: installBackendRuntime, responses: { '202': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/backend-runtime-installs:
    get: { tags: [BackendRuntimes], operationId: listBackendRuntimeInstalls, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/backend-runtime-installs/{install_id}:
    parameters: [{ $ref: '#/components/parameters/InstallId' }]
    get:    { tags: [BackendRuntimes], operationId: getBackendRuntimeInstall, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
    delete: { tags: [BackendRuntimes], operationId: uninstallBackendRuntime, responses: { '204': { description: Uninstalled. } } }
  /api/v1/backend-runtime-installs/{install_id}/progress:
    parameters: [{ $ref: '#/components/parameters/InstallId' }]
    get:
      tags: [BackendRuntimes, Streams]
      operationId: streamBackendRuntimeInstallProgress
      summary: SSE progress stream.
      responses:
        '200':
          description: SSE stream.
          content: { text/event-stream: { schema: { type: string } } }
  /api/v1/backend-runtime-installs/{install_id}/health:
    parameters: [{ $ref: '#/components/parameters/InstallId' }]
    get: { tags: [BackendRuntimes], operationId: getBackendRuntimeInstallHealth, responses: { '200': { $ref: '#/components/responses/JsonOk' } } }
  /api/v1/backend-runtime-installs/{install_id}/retry:
    parameters: [{ $ref: '#/components/parameters/InstallId' }]
