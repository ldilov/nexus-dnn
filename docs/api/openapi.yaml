    get:    { tags: [EmotionTTS], operationId: emotionttsGetMapping, responses: { '200': { description: Mapping., content: { application/json: { schema: { $ref: '#/components/schemas/EmotionTtsCharacterMappingRow' } } } }, '404': { description: Not found, or row belongs to a different deployment. } } }
    patch:
      tags: [EmotionTTS]
