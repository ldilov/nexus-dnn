name: boundary-audit

on:
  pull_request:
    paths:
      - "crates/nexus-**"
      - "apps/web/src/**"
      - "migrations/**"
      - "scripts/audit-runtime-boundary.ps1"
      - "scripts/boundary-exclusions.yaml"
  push:
    branches: [main]
    paths:
      - "crates/nexus-**"
      - "apps/web/src/**"
      - "migrations/**"
      - "scripts/audit-runtime-boundary.ps1"
      - "scripts/boundary-exclusions.yaml"

jobs:
  audit:
    name: Host ↔ extension boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run scripts/audit-runtime-boundary.ps1
        run: |
          pwsh -ExecutionPolicy Bypass -File scripts/audit-runtime-boundary.ps1

      - name: Run local-llm boundary audit
        run: |
          bash extensions/builtin/local-llm/scripts/audit-boundary.sh

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: nexus-api-boundary

      - name: Run draft_suggestions boundary + handler tests
        run: cargo test -p nexus-api --test draft_suggestions

      - name: Run text_completion boundary grep (spec 049 D9 + spec 050 D2)
        # Generic broker route + canonical lease contract must not
        # reference any specific extension id, scene/storyboard concept,
        # or domain feature. Banned forms listed inline so violation
        # messages are self-explanatory.
        run: |
          BANNED='longcat|long_cat|storyboard|scene_context|emotion_tts|video\.plan|video_plan|adain|interpolation_plan|prompt_artifacts|profile_registry|model_profiles|safety_tier|longcat_video'
          violation=0
          for target in \
              crates/nexus-api/src/handlers/text_completion/ \
              crates/nexus-backend-runtimes/src/generic/leases/text_completion.rs ; do
            if grep -rnIE "$BANNED" "$target" ; then
              echo "::error::Boundary violation in $target — see specs/050-longcat-prompt-processing/synthesis.md and .claude/rules/host-extension-boundary.md"
              violation=1
            fi
          done
          exit $violation

      - name: Run text_completion handler tests
        run: cargo test -p nexus-api --lib text_completion

      - name: Run generic text_completion lease contract tests (spec 050 D2)
        run: cargo test -p nexus-backend-runtimes --lib generic::leases::text_completion
